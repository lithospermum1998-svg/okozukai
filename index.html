<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#070707" />
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>MONEY LOG</title>
<link rel="apple-touch-icon" href="./7BBA3812-AFC2-4E73-91C9-B4CDDB54DE12.png">
<link rel="icon" type="image/png" href="./7BBA3812-AFC2-4E73-91C9-B4CDDB54DE12.png">
<style>
:root {
  --bg: #070707;
  --surface: rgba(22,23,25,0.97);
  --surface-2: #1e1f21;
  --surface-3: #2a2b2e;
  --text-main: #f3f4f6;
  --text-sub: #9b9da3;
  --text-soft: #555860;
  --line: rgba(255,255,255,0.07);
  --accent: #8f949e;
  --pos: #4ade80;
  --neg: #ff6478;
  --chart-line: #6ee7b7;
  --chart-fill-top: rgba(110,231,183,0.18);
  --chart-fill-bot: rgba(110,231,183,0.01);
  --radius: 26px;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

html, body {
  min-height: 100%;
  color: var(--text-main);
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", sans-serif;
  background: #070707;
}

body {
  min-height: 100vh;
  padding: calc(20px + env(safe-area-inset-top)) 16px calc(110px + env(safe-area-inset-bottom));
  overflow-x: hidden;
}

/* ── Header ── */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.app-title {
  font-size: 17px;
  font-weight: 900;
  letter-spacing: 0.20em;
  color: #fafbfc;
}

.app-sub {
  font-size: 9px;
  color: var(--text-soft);
  font-weight: 700;
  letter-spacing: 0.12em;
  margin-top: 4px;
}

.sync-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 12px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.07);
  background: rgba(255,255,255,0.035);
  color: var(--text-soft);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.03em;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}

.sync-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: rgba(255,255,255,0.18);
}

/* ── Main Card ── */
.main-card {
  position: relative;
  border-radius: var(--radius);
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.09);
  background:
    linear-gradient(180deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.025) 10%, transparent 26%),
    linear-gradient(180deg, rgba(32,33,36,0.99) 0%, rgba(16,17,19,1) 100%);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.09),
    inset 0 -1px 0 rgba(255,255,255,0.012),
    0 24px 56px rgba(0,0,0,0.50),
    0 8px 18px rgba(0,0,0,0.28);
}

/* ── Top section ── */
.card-top {
  padding: 22px 22px 0;
}

.fund-name {
  font-size: 11px;
  font-weight: 800;
  color: var(--text-sub);
  letter-spacing: 0.07em;
  margin-bottom: 3px;
}

.fund-code {
  font-size: 9px;
  color: var(--text-soft);
  font-weight: 600;
  letter-spacing: 0.10em;
}

.nisa-badge {
  display: inline-block;
  font-size: 8px;
  font-weight: 800;
  color: #a7f3c8;
  border: 1px solid rgba(74,222,128,0.20);
  border-radius: 999px;
  padding: 2px 8px;
  background: rgba(74,222,128,0.07);
  margin-left: 8px;
  letter-spacing: 0.06em;
  vertical-align: middle;
  position: relative;
  top: -1px;
}

/* ── Valuation hero ── */
.valuation-row {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  margin-top: 16px;
}

.val-main {
  font-size: 40px;
  font-weight: 900;
  letter-spacing: -1.5px;
  color: #f9fafb;
  font-variant-numeric: tabular-nums;
  line-height: 1;
}

.val-right {
  text-align: right;
  padding-bottom: 3px;
}

.day-badge {
  font-size: 13px;
  font-weight: 800;
  font-variant-numeric: tabular-nums;
  line-height: 1;
  letter-spacing: -0.02em;
}

.total-rate {
  font-size: 11px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  margin-top: 5px;
  opacity: 0.80;
}

/* ── P&L highlight ── */
.pnl-row {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-top: 14px;
  padding: 12px 0 16px;
  border-bottom: 1px solid var(--line);
}

.pnl-value {
  font-size: 22px;
  font-weight: 900;
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.6px;
  line-height: 1;
}

.pnl-rate {
  font-size: 13px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  opacity: 0.70;
}

/* ── Chart ── */
.chart-section {
  padding: 16px 0 0;
}

.chart-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 22px;
  margin-bottom: 10px;
}

.chart-title {
  font-size: 10px;
  font-weight: 700;
  color: var(--text-soft);
  letter-spacing: 0.09em;
  text-transform: uppercase;
}

.chart-period-tabs {
  display: flex;
  gap: 3px;
}

.period-tab {
  font-size: 10px;
  font-weight: 700;
  color: var(--text-soft);
  padding: 3px 9px;
  border-radius: 999px;
  border: 1px solid transparent;
  background: transparent;
  cursor: pointer;
  transition: all 0.15s;
  -webkit-user-select: none;
  user-select: none;
}

.period-tab.active {
  color: var(--text-main);
  border-color: rgba(255,255,255,0.11);
  background: rgba(255,255,255,0.055);
}

.chart-wrap {
  width: 100%;
  height: 96px;
  position: relative;
}

svg.chart-svg {
  width: 100%;
  height: 100%;
  display: block;
  overflow: visible;
}

.chart-empty {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 96px;
  font-size: 11px;
  color: var(--text-soft);
  font-weight: 600;
  letter-spacing: 0.04em;
}

/* ── Meta grid ── */
.meta-section {
  padding: 16px 22px 20px;
  border-top: 1px solid var(--line);
}

.meta-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0;
}

.meta-item {
  padding: 0 4px;
}

.meta-item:first-child { padding-left: 0; }
.meta-item:last-child { padding-right: 0; }

.meta-label {
  font-size: 9px;
  font-weight: 700;
  color: var(--text-soft);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 6px;
}

.meta-value {
  font-size: 12px;
  font-weight: 800;
  font-variant-numeric: tabular-nums;
  color: #dde0e6;
  line-height: 1;
}

.meta-value.editable {
  cursor: pointer;
  border-bottom: 1px dashed rgba(255,255,255,0.10);
  display: inline-block;
}

.inline-input {
  width: 100%;
  background: var(--surface-3);
  border: 1px solid rgba(255,255,255,0.18);
  color: var(--text-main);
  font-family: inherit;
  font-size: 12px;
  font-weight: 800;
  border-radius: 5px;
  padding: 2px 4px;
  outline: none;
  font-variant-numeric: tabular-nums;
}



/* ── Bottom bar ── */
.bottom-bar {
  position: fixed;
  left: 0; right: 0; bottom: 0;
  padding: 8px 16px calc(18px + env(safe-area-inset-bottom));
  display: flex;
  justify-content: center;
  z-index: 20;
  background: linear-gradient(to top, rgba(4,4,4,0.88) 0%, rgba(4,4,4,0.42) 50%, transparent 100%);
  pointer-events: none;
}

.update-btn {
  pointer-events: auto;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  min-width: 158px;
  height: 52px;
  padding: 0 24px;
  border-radius: 999px;
  background: rgba(255,255,255,0.06);
  color: var(--text-main);
  font-size: 14px;
  font-weight: 800;
  letter-spacing: -0.02em;
  border: 1px solid rgba(255,255,255,0.11);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 8px 22px rgba(0,0,0,0.28);
  backdrop-filter: blur(32px) saturate(150%);
  -webkit-backdrop-filter: blur(32px) saturate(150%);
  transition: transform 0.1s, opacity 0.15s;
  cursor: pointer;
  -webkit-user-select: none;
  user-select: none;
}

.update-btn:active { transform: scale(0.96); }
.update-btn:disabled { opacity: 0.55; cursor: default; }

.update-icon { font-size: 16px; }

/* ── Toast ── */
.toast {
  position: fixed;
  left: 50%;
  bottom: calc(82px + env(safe-area-inset-bottom));
  transform: translateX(-50%) translateY(10px);
  opacity: 0;
  pointer-events: none;
  z-index: 30;
  padding: 10px 16px;
  border-radius: 999px;
  background: rgba(30,32,36,0.95);
  border: 1px solid rgba(255,255,255,0.10);
  color: #f5f7fb;
  font-size: 12px;
  font-weight: 800;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  transition: opacity 0.2s, transform 0.2s;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.pos { color: var(--pos); }
.neg { color: var(--neg); }
.neutral { color: var(--text-sub); }

@media (max-width: 360px) {
  .val-main { font-size: 32px; }
  .pnl-value { font-size: 17px; }
}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="app-title">MONEY LOG</div>
    <div class="app-sub">SOX PORTFOLIO</div>
  </div>
  <div class="sync-pill">
    <span class="sync-dot"></span>
    <span id="lastSyncDisplay">Last Sync: --:--</span>
  </div>
</div>

<div class="main-card" id="mainCard"></div>

<div class="bottom-bar">
  <button id="updateBtn" class="update-btn" onclick="fetchAll()">
    <span id="updateIcon" class="update-icon">↻</span>
    <span id="updateLabel">update</span>
  </button>
</div>

<div id="toast" class="toast"></div>

<script>
const GAS_API_URL = "https://script.google.com/macros/s/AKfycby2CVXP9e34KWPbe8tFqhjvnznaq03Z8R-EoWLZeafce3PY_aet8nzEd0MlTj77YZM9/exec";
const SK = "money_log_sox_v2";

// ── State ──
const DEFAULT = {
  name: "楽天・プラス・SOX",
  code: "2931123A",
  price: 19391,
  holding: 59845,
  cost: 121180,
  isNisa: true,
  diff: null
};

function loadState() {
  try {
    const s = localStorage.getItem(SK);
    return s ? { ...DEFAULT, ...JSON.parse(s) } : { ...DEFAULT };
  } catch { return { ...DEFAULT }; }
}

function loadHistory() {
  try {
    const h = localStorage.getItem(SK + "_hist");
    return h ? JSON.parse(h) : [];
  } catch { return []; }
}

let stock = loadState();
let history = loadHistory(); // [{date:"2025-05-01", pnl: 12000}, ...]
let activePeriod = "ALL";
let editingField = null;
let isUpdating = false;
let lastSyncTime = localStorage.getItem(SK + "_sync") || "--:--";

function save() {
  localStorage.setItem(SK, JSON.stringify(stock));
}

function saveHistory() {
  localStorage.setItem(SK + "_hist", JSON.stringify(history));
}

// ── Calcs ──
function valuation() {
  return stock.price * stock.holding / 10000;
}

function avgCostPerUnit() {
  return stock.holding > 0 ? stock.cost / stock.holding * 10000 : 0;
}

function unrealizedPnL() {
  return valuation() - stock.cost;
}

function unrealizedRate() {
  return stock.cost > 0 ? (unrealizedPnL() / stock.cost * 100) : 0;
}



// ── Format ──
const fmt = v => v === null || !isFinite(v) ? "---" : "¥" + Math.round(v).toLocaleString();
const fmtS = v => {
  if (v === null || !isFinite(v)) return "---";
  const r = Math.round(v);
  return (r >= 0 ? "+" : "") + r.toLocaleString();
};
const fmtP = v => v === null || !isFinite(v) ? "---" : (v >= 0 ? "+" : "") + v.toFixed(2) + "%";
const fmtN = (v, d=0) => v === null || !isFinite(v) ? "---" :
  Number(v).toLocaleString(undefined, { minimumFractionDigits: d, maximumFractionDigits: d });

// ── Toast ──
let _toastTimer;
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove("show"), 1400);
}

// ── Edit ──
function startEdit(field) {
  editingField = field;
  render();
  requestAnimationFrame(() => {
    const el = document.getElementById("input-" + field);
    if (el) { el.focus(); el.select(); }
  });
}

function finishEdit(field, value) {
  const n = parseFloat(value);
  if (!isNaN(n) && isFinite(n)) {
    stock[field] = n;
    save();
    showToast("Saved");
  }
  editingField = null;
  render();
}

function recordTodayPnL() {
  const today = new Date().toISOString().slice(0, 10);
  const pnl = Math.round(unrealizedPnL());
  const idx = history.findIndex(h => h.date === today);
  if (idx >= 0) history[idx].pnl = pnl;
  else history.push({ date: today, pnl });
  // 最大180件
  if (history.length > 180) history = history.slice(-180);
  saveHistory();
}

// ── Period filter ──
function getFilteredHistory() {
  if (!history.length) return [];
  const now = new Date();
  let cutoff = null;
  if (activePeriod === "1M") {
    cutoff = new Date(now); cutoff.setMonth(cutoff.getMonth() - 1);
  } else if (activePeriod === "3M") {
    cutoff = new Date(now); cutoff.setMonth(cutoff.getMonth() - 3);
  } else if (activePeriod === "6M") {
    cutoff = new Date(now); cutoff.setMonth(cutoff.getMonth() - 6);
  }
  const sorted = [...history].sort((a,b) => a.date.localeCompare(b.date));
  return cutoff ? sorted.filter(h => new Date(h.date) >= cutoff) : sorted;
}

// ── Chart ──
function buildChart() {
  const data = getFilteredHistory();
  if (data.length < 2) {
    return `<div class="chart-empty">データを蓄積中…</div>`;
  }

  const vals = data.map(d => d.pnl);
  const minV = Math.min(...vals);
  const maxV = Math.max(...vals);
  const range = maxV - minV || 1;

  const W = 400, H = 80, PAD = 6;
  const pts = data.map((d, i) => {
    const x = PAD + (i / (data.length - 1)) * (W - PAD * 2);
    const y = PAD + (1 - (d.pnl - minV) / range) * (H - PAD * 2);
    return [x, y];
  });

  const pathD = pts.map((p, i) => (i === 0 ? `M${p[0]},${p[1]}` : `L${p[0]},${p[1]}`)).join(" ");
  const fillD = `${pathD} L${pts[pts.length-1][0]},${H} L${pts[0][0]},${H} Z`;

  const lastPnl = vals[vals.length - 1];
  const lineColor = lastPnl >= 0 ? "#6ee7b7" : "#ff6478";
  const fillTop = lastPnl >= 0 ? "rgba(110,231,183,0.20)" : "rgba(255,100,120,0.20)";
  const fillBot = lastPnl >= 0 ? "rgba(110,231,183,0.01)" : "rgba(255,100,120,0.01)";

  const gradId = "cg" + Date.now();

  return `
    <div class="chart-wrap">
      <svg class="chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
        <defs>
          <linearGradient id="${gradId}" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="${fillTop}"/>
            <stop offset="100%" stop-color="${fillBot}"/>
          </linearGradient>
        </defs>
        <path d="${fillD}" fill="url(#${gradId})" />
        <path d="${pathD}" fill="none" stroke="${lineColor}" stroke-width="1.5"
          stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  `;
}

// ── Render ──
function render() {
  document.getElementById("lastSyncDisplay").textContent = "Last Sync: " + lastSyncTime;

  const val = valuation();
  const pnl = unrealizedPnL();
  const rate = unrealizedRate();
  const avg = avgCostPerUnit();
  const dayDiff = stock.diff !== null ? val * (parseFloat(stock.diff) / 100) : null;

  const inlineOrVal = (field, display) => {
    if (editingField === field) {
      return `<input id="input-${field}" class="inline-input" type="number" step="any"
        value="${stock[field]}"
        onblur="finishEdit('${field}', this.value)"
        onkeydown="if(event.key==='Enter')this.blur()">`;
    }
    return `<span class="meta-value editable" onclick="startEdit('${field}')">${display}</span>`;
  };

  const periods = ["1M","3M","6M","ALL"];

  document.getElementById("mainCard").innerHTML = `
    <div class="card-top">
      <div>
        <div class="fund-name">${stock.name}</div>
        <div class="fund-code">${stock.code}</div>
      </div>

      <div class="valuation-row">
        <div class="val-main">${fmt(val)}</div>
        <div class="val-right">
          <div class="day-badge ${dayDiff === null ? 'neutral' : (dayDiff >= 0 ? 'pos' : 'neg')}">
            Day ${dayDiff === null ? "---" : fmtS(dayDiff)}
          </div>
          <div class="total-rate ${dayDiff === null ? 'neutral' : (dayDiff >= 0 ? 'pos' : 'neg')}">${stock.diff !== null ? fmtP(parseFloat(stock.diff)) : '---'}</div>
          <div class="total-rate ${rate >= 0 ? 'pos' : 'neg'}">${fmtP(rate)}</div>
        </div>
      </div>

      <div class="pnl-row">
        <div class="pnl-value ${pnl >= 0 ? 'pos' : 'neg'}">${fmtS(pnl)}</div>
        <div class="pnl-rate ${pnl >= 0 ? 'pos' : 'neg'}">${fmtP(rate)}</div>
      </div>
    </div>

    <div class="chart-section">
      <div class="chart-header">
        <div class="chart-title">損益の推移</div>
        <div class="chart-period-tabs">
          ${periods.map(p => `<button class="period-tab ${p === activePeriod ? 'active' : ''}"
            onclick="setPeriod('${p}')">${p}</button>`).join("")}
        </div>
      </div>
      ${buildChart()}
    </div>

    <div class="meta-section">
      <div class="meta-grid">
        <div class="meta-item">
          <div class="meta-label">NAV</div>
          <span class="meta-value">${fmtN(stock.price, 0)}</span>
        </div>
        <div class="meta-item">
          <div class="meta-label">口数</div>
          ${inlineOrVal("holding", fmtN(stock.holding, 0))}
        </div>
        <div class="meta-item">
          <div class="meta-label">取得コスト</div>
          ${inlineOrVal("cost", fmt(stock.cost))}
        </div>
        <div class="meta-item">
          <div class="meta-label">平均取得単価</div>
          <span class="meta-value">${fmtN(avg, 0)}</span>
        </div>
      </div>
    </div>
  `;
}

function setPeriod(p) {
  activePeriod = p;
  render();
}

// ── Fetch ──
async function fetchAll() {
  if (isUpdating) return;
  isUpdating = true;

  const btn = document.getElementById("updateBtn");
  const icon = document.getElementById("updateIcon");
  const label = document.getElementById("updateLabel");

  btn.disabled = true;
  label.textContent = "updating";

  const anim = icon.animate(
    [{ transform: "rotate(0deg)" }, { transform: "rotate(360deg)" }],
    { duration: 900, iterations: Infinity, easing: "linear" }
  );

  try {
    const res = await fetch(`${GAS_API_URL}?code=${encodeURIComponent(stock.code)}`, { cache: "no-store" });
    const json = await res.json();

    if (json.status === "Success") {
      stock.price = json.price;
      stock.diff = json.diff ?? null;
      save();

      // 今日の損益を記録
      recordTodayPnL();

      const now = new Date();
      lastSyncTime = now.getHours() + ":" + String(now.getMinutes()).padStart(2, "0");
      localStorage.setItem(SK + "_sync", lastSyncTime);

      render();
      anim.cancel();
      label.textContent = "updated";
      showToast("Updated");
    } else {
      throw new Error("API error");
    }
  } catch (e) {
    anim.cancel();
    label.textContent = "failed";
    showToast("Update failed");
  }

  setTimeout(() => {
    label.textContent = "update";
    btn.disabled = false;
    isUpdating = false;
  }, 1100);
}

render();
</script>
</body>
</html>
