<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>MONEY LOG v4.1 Tight Dark</title>
<style>
:root {
  --bg-color: #000000;
  --card-bg: #1c1c1e;
  --text-main: #ffffff;
  --text-sub: #8e8e93;
  --input-bg: #2c2c2e;
  --input-border: #3a3a3c;
  --accent: #ffffff;
  --pos-color: #32d74b;
  --neg-color: #ff453a;
}

body {
  font-family: -apple-system, sans-serif;
  background: var(--bg-color);
  margin: 0;
  padding: 8px; /* 全体余白を縮小 */
  color: var(--text-main);
  line-height: 1.1;
  padding-bottom: 90px;
}
.container { max-width: 420px; margin: 0 auto; }

/* プログレス・サマリーをコンパクトに */
.progress-box {
  background: var(--card-bg);
  border-radius: 12px;
  padding: 12px 16px;
  margin-bottom: 10px;
  border: 1px solid var(--input-border);
}
.total-val { font-size: 32px; font-weight: 800; letter-spacing: -1px; margin: 4px 0; }
.progress-bar-container { background: #3a3a3c; height: 3px; border-radius: 2px; margin: 8px 0; overflow: hidden; }
#progressBar { background: var(--accent); height: 100%; width: 0%; transition: width 0.8s ease; }

.summary-stats { display: flex; gap: 12px; font-size: 12px; font-weight: 700; margin-bottom: 8px; }

/* Payoutを1行で表現 */
.payout-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-top: 1px solid #2c2c2e;
  padding-top: 8px;
  margin-top: 8px;
}
.payout-label { font-size: 10px; color: var(--text-sub); font-weight: 800; }
.payout-val { font-size: 14px; font-weight: 700; }

/* 銘柄カードを圧縮 */
.stock-card {
  background: var(--card-bg);
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 8px;
  border: 1px solid var(--input-border);
}
.stock-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.stock-name { font-weight: 700; font-size: 13px; color: var(--text-sub); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 70%; }
.nisa-tag { font-size: 8px; font-weight: 900; padding: 1px 5px; border-radius: 3px; background: #3a3a3c; color: var(--text-sub); }

.price-row { display: flex; justify-content: space-between; align-items: baseline; }
.main-price { font-size: 24px; font-weight: 800; }

/* インプットを横1列でさらにタイトに */
.input-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-top: 10px; }
.input-group { display: flex; flex-direction: column; }
.input-label { font-size: 8px; color: #636366; margin-bottom: 2px; font-weight: 800; text-transform: uppercase; }
.ios-input {
  width: 100%;
  padding: 6px;
  font-size: 12px;
  border: 1px solid var(--input-border);
  border-radius: 6px;
  background: var(--input-bg);
  color: #fff;
  font-weight: 600;
}

/* アップデートボタンを少し小さめに */
.btn-fixed-wrap { position: fixed; bottom: 25px; left: 0; right: 0; display: flex; justify-content: center; pointer-events: none; z-index: 100; }
.btn-update {
  pointer-events: auto;
  background: #fff;
  color: #000;
  border: none;
  padding: 12px 28px;
  border-radius: 30px;
  font-size: 14px;
  font-weight: 800;
  box-shadow: 0 8px 20px rgba(0,0,0,0.6);
  display: flex;
  align-items: center;
  gap: 8px;
}

.last-updated { font-size: 9px; color: var(--text-sub); text-align: center; margin-top: 8px; }
@keyframes spin { 100% { transform: rotate(360deg); } }
.loading-icon { display: inline-block; animation: spin 1s linear infinite; }
</style>
</head>
<body>

<div class="container">
  <div id="errorBanner" style="display:none; color:var(--neg-color); font-size:10px; text-align:center; padding:5px;"></div>

  <div class="progress-box">
    <div style="font-size:9px; color:var(--text-sub); display:flex; justify-content:space-between; font-weight:900;">
      <div>10M TARGET <span id="progRate" style="color:#fff;">(0%)</span></div>
      <div id="fxRateDisplay">USD/JPY: ---</div>
    </div>
    <div class="progress-bar-container"><div id="progressBar"></div></div>
    <span id="totalDisplay" class="total-val">¥0</span>
    <div class="summary-stats">
      <span id="totalDayDiff">--</span>
      <span id="totalProfitAll">--</span>
    </div>
    <div class="payout-row">
      <span class="payout-label">EST. PAYOUT (NET)</span>
      <div id="payoutDisplay" class="payout-val">¥0</div>
    </div>
  </div>

  <div id="stockList"></div>
  <div id="lastUpdated" class="last-updated"></div>
</div>

<div class="btn-fixed-wrap">
  <button id="updateBtn" class="btn-update" onclick="fetchAll()">
    <span id="updateIcon">↻</span> UPDATE
  </button>
</div>

<script>
// --- JavaScript Logic (Same as before, simplified for rendering) ---
const GAS_API_URL = "https://script.google.com/macros/s/AKfycbyBwS13vfLF_Ndut84W1Sjujp538VOoSNa_18dtxJOqT4y6ubnpOEVm6aUTLzksI6sl/exec";
const STORAGE_KEY = "money_log_v3.2";

const ITEM_DEFAULTS = { diff: null, rate: null };
function migrateData(raw) {
  if (!Array.isArray(raw)) return null;
  return raw.map(item => ({ ...ITEM_DEFAULTS, ...item }));
}

const INITIAL_DATA = [
  { name: "楽天・プラス・SOX", code: "2931123A", price: 19391, holding: 59845, cost: 121180, isStock: false, isNisa: true, diff: null },
  { name: "PayPay", code: "PAYP", price: 23.04, holding: 1.86131, cost: 4749, isStock: true, isNisa: false, rate: null, diff: null }
];

let data = (() => {
  try {
    const raw = JSON.parse(localStorage.getItem(STORAGE_KEY));
    return migrateData(raw) || INITIAL_DATA;
  } catch (e) { return INITIAL_DATA; }
})();

const BRAND_COLORS = { "2931123A": "#8B0000", "PAYP": "#ff3b30" };
let currentUsdJpy = (() => {
  const saved = localStorage.getItem(STORAGE_KEY + "_usd");
  return saved ? parseFloat(saved) : null;
})();

async function fetchAll() {
  const btn = document.getElementById('updateBtn');
  const icon = document.getElementById('updateIcon');
  btn.disabled = true; icon.classList.add('loading-icon');
  const errors = [];
  await Promise.all(data.map(async (s) => {
    try {
      const res = await fetch(`${GAS_API_URL}?code=${s.code}`);
      const json = await res.json();
      if (json.status === "Success") {
        s.price = json.price; s.diff = json.diff ?? null;
        if (json.rate) {
          s.rate = json.rate; currentUsdJpy = json.rate;
          localStorage.setItem(STORAGE_KEY + "_usd", String(json.rate));
        }
      }
    } catch (e) { errors.push(s.name); }
  }));
  btn.disabled = false; icon.classList.remove('loading-icon');
  const now = new Date();
  document.getElementById('lastUpdated').textContent = `SYNC: ${now.toLocaleTimeString()}`;
  saveAndRender();
}

function saveAndRender() { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); render(); }

function calcValuation(s) {
  if (s.isStock) {
    const rate = s.rate ?? currentUsdJpy;
    return rate ? Math.floor(s.price * rate * s.holding) : null;
  }
  return Math.floor(s.price * s.holding / 10000);
}

function render() {
  const list = document.getElementById('stockList');
  let totalValue = 0, totalCost = 0, dayDiffSum = 0, taxableProfit = 0;

  list.innerHTML = data.map((s, i) => {
    const val = calcValuation(s) || 0;
    totalValue += val; totalCost += s.cost;
    const hasDiff = s.diff !== null;
    const dVal = hasDiff ? Math.floor(val * (parseFloat(s.diff) / 100)) : 0;
    if (hasDiff) dayDiffSum += dVal;
    const profit = val - s.cost;
    const profitRate = s.cost > 0 ? (profit / s.cost * 100).toFixed(2) : '0.00';
    if (!s.isNisa) taxableProfit += profit;
    const brandColor = BRAND_COLORS[s.code] || '#3a3a3c';

    return `
      <div class="stock-card" style="border-left: 3px solid ${brandColor}">
        <div class="stock-header">
          <span class="stock-name">${s.name}</span>
          <span class="nisa-tag">${s.isNisa ? 'NISA' : 'TAXABLE'}</span>
        </div>
        <div class="price-row">
          <span class="main-price">¥${val.toLocaleString()}</span>
          <div style="text-align:right">
            <div style="font-size:11px; font-weight:800; color:${dVal >= 0 ? 'var(--pos-color)' : 'var(--neg-color)'}">
              ${hasDiff ? (dVal >= 0 ? '+' : '') + dVal.toLocaleString() : '---'}
            </div>
            <div style="font-size:10px; font-weight:800; color:${profit >= 0 ? 'var(--pos-color)' : 'var(--neg-color)'}">
              ${profitRate}%
            </div>
          </div>
        </div>
        <div class="input-grid">
          <div class="input-group"><span class="input-label">Price</span><input class="ios-input" type="number" step="any" value="${s.price}" onchange="updateItem(${i},'price',this.value)"></div>
          <div class="input-group"><span class="input-label">Qty</span><input class="ios-input" type="number" step="any" value="${s.holding}" onchange="updateItem(${i},'holding',this.value)"></div>
          <div class="input-group"><span class="input-label">Cost</span><input class="ios-input" type="number" value="${s.cost}" onchange="updateItem(${i},'cost',this.value)"></div>
        </div>
      </div>`;
  }).join('');

  document.getElementById('totalDisplay').textContent = `¥${totalValue.toLocaleString()}`;
  document.getElementById('fxRateDisplay').textContent = `USD/JPY: ¥${currentUsdJpy?.toFixed(2) || '---'}`;
  
  const anyDiff = data.some(s => s.diff !== null);
  const dayEl = document.getElementById('totalDayDiff');
  dayEl.textContent = anyDiff ? `${(dayDiffSum >= 0 ? '+' : '')}${dayDiffSum.toLocaleString()}` : '---';
  dayEl.style.color = dayDiffSum >= 0 ? 'var(--pos-color)' : 'var(--neg-color)';

  const overallProfit = totalValue - totalCost;
  const profEl = document.getElementById('totalProfitAll');
  profEl.textContent = `${(overallProfit >= 0 ? '+' : '')}${overallProfit.toLocaleString()}`;
  profEl.style.color = overallProfit >= 0 ? 'var(--pos-color)' : 'var(--neg-color)';

  const estTax = taxableProfit > 0 ? Math.floor(taxableProfit * 0.20315) : 0;
  document.getElementById('payoutDisplay').innerHTML = `¥${(totalValue - estTax).toLocaleString()} <span style="font-size:9px; color:var(--text-sub); font-weight:normal;">(Tax: ¥${estTax.toLocaleString()})</span>`;

  const prog = Math.min((totalValue / 10000000) * 100, 100);
  document.getElementById('progRate').textContent = `(${prog.toFixed(1)}%)`;
  document.getElementById('progressBar').style.width = prog + '%';
}

function updateItem(i, field, val) {
  const parsed = parseFloat(val);
  if (!isNaN(parsed)) { data[i][field] = parsed; saveAndRender(); }
}

render();
</script>
</body>
</html>
