<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#f4f3f0" />
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="mobile-web-app-capable" content="yes">
<title>MONEY LOG ARCHIVE</title>
<link rel="apple-touch-icon" href="./7BBA3812-AFC2-4E73-91C9-B4CDDB54DE12.png">
<link rel="icon" type="image/png" href="./7BBA3812-AFC2-4E73-91C9-B4CDDB54DE12.png">
<style>
:root {
  --bg: #f4f3f0;
  --text-main: #1c1b1a;
  --text-sub: #7a7772;
  --text-soft: #c8c6be;
  --line: #e2e0d8;
  --pos: #2a6f43; /* ボタニカルグリーン */
  --neg: #b83b30; /* マダーレッド */
  --chart-line: #1c1b1a;
  --accent: #ffffff;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

html, body {
  min-height: 100%;
  color: var(--text-main);
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
  background: var(--bg);
  overflow-x: hidden;
}

body {
  min-height: 100vh;
  padding: calc(40px + env(safe-area-inset-top)) 24px calc(130px + env(safe-area-inset-bottom));
}

.app-container {
  max-width: 480px;
  margin: 0 auto;
}

/* ── Header ── */
.header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--text-main);
  margin-bottom: 40px;
}

.app-title {
  font-size: 14px;
  font-weight: 800;
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

.app-sub {
  font-size: 10px;
  color: var(--text-sub);
  font-variant-numeric: tabular-nums;
}

.system-actions {
  display: flex;
  gap: 8px;
}
.sys-btn {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-sub);
  text-decoration: underline;
  cursor: pointer;
  user-select: none;
}
.sys-btn:active { color: var(--text-main); }

/* ── Hero Asset Block (伝統と知性の伝統的タイポグラフィ) ── */
.hero-block {
  margin-bottom: 48px;
}

.status-badge-wrapper {
  height: 20px;
  margin-bottom: 8px;
}
.status-badge {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.1em;
  color: var(--text-sub);
  text-transform: uppercase;
  border: 1px solid var(--text-soft);
  padding: 2px 8px;
  display: inline-block;
}
.status-badge.history-mode {
  background: var(--text-main);
  color: var(--bg);
  border-color: var(--text-main);
}

.val-main {
  font-family: "Georgia", "Times New Roman", serif;
  font-size: 56px;
  font-weight: 400;
  letter-spacing: -1px;
  line-height: 1.0;
  font-variant-numeric: tabular-nums;
  margin-top: 4px;
}

/* ── Stats Grid ── */
.stats-layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  margin-bottom: 48px;
}

.stat-card {
  display: flex;
  flex-direction: column;
}

.stat-label {
  font-size: 9px;
  font-weight: 700;
  color: var(--text-sub);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.stat-num {
  font-family: "Georgia", "Times New Roman", serif;
  font-size: 26px;
  font-weight: 400;
  font-variant-numeric: tabular-nums;
}

.stat-per {
  font-size: 12px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  margin-top: 4px;
}

/* ── Fine Line Chart ── */
.chart-container {
  margin-bottom: 48px;
}

.chart-meta-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--line);
}

.chart-headline {
  font-size: 10px;
  font-weight: 700;
  color: var(--text-sub);
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.period-selector {
  display: flex;
  gap: 4px;
}

.p-tab {
  font-size: 10px;
  font-weight: 700;
  color: var(--text-sub);
  padding: 3px 8px;
  border: none;
  background: transparent;
  cursor: pointer;
}
.p-tab.active {
  color: var(--text-main);
  text-decoration: underline;
  text-underline-offset: 3px;
}

.canvas-wrapper {
  width: 100%;
  height: 150px;
  position: relative;
  cursor: crosshair;
}

svg.chart-canvas-svg {
  width: 100%;
  height: 100%;
  display: block;
  overflow: visible;
}

svg.chart-canvas-svg path {
  transition: d 0.3s cubic-bezier(0.25, 1, 0.5, 1), stroke 0.3s;
}

.chart-empty {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 150px;
  font-size: 11px;
  color: var(--text-sub);
  letter-spacing: 0.05em;
}

/* ── Meta Blueprint Dashboard ── */
.dashboard-list {
  display: flex;
  flex-direction: column;
  border-top: 1px solid var(--text-main);
}

.dash-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 0;
  border-bottom: 1px solid var(--line);
}

.dash-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-sub);
}

.dash-val {
  font-size: 13px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
}
.dash-val.editable {
  cursor: pointer;
  color: var(--text-main);
  border-bottom: 1px dotted var(--text-sub);
}

.dash-input {
  background: var(--accent);
  border: 1px solid var(--text-main);
  color: var(--text-main);
  font-family: inherit;
  font-size: 13px;
  font-weight: 700;
  padding: 2px 6px;
  outline: none;
  text-align: right;
  font-variant-numeric: tabular-nums;
}

/* ── Modern Bottom Dock Bar ── */
.bottom-dock {
  position: fixed;
  left: 0; right: 0; bottom: 0;
  padding: 16px 24px calc(24px + env(safe-area-inset-bottom));
  display: flex;
  justify-content: center;
  z-index: 10;
  background: linear-gradient(to top, var(--bg) 80%, transparent);
  pointer-events: none;
}

.action-trigger {
  pointer-events: auto;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  width: 100%;
  height: 52px;
  background: var(--text-main);
  color: var(--bg);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  border: none;
  transition: opacity 0.15s ease;
  cursor: pointer;
}
.action-trigger:active { opacity: 0.85; }
.action-trigger:disabled { opacity: 0.2; }

/* ── Toast ── */
.toast {
  position: fixed;
  left: 50%;
  bottom: calc(90px + env(safe-area-inset-bottom));
  transform: translateX(-50%) translateY(10px);
  opacity: 0;
  pointer-events: none;
  z-index: 100;
  padding: 10px 20px;
  background: var(--text-main);
  color: var(--bg);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.05em;
  transition: all 0.2s ease;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── Global Color Classes ── */
.pos { color: var(--pos) !important; }
.neg { color: var(--neg) !important; }
.neutral { color: var(--text-sub) !important; }
</style>
</head>
<body>

<div class="app-container">
  <div class="header">
    <div class="app-title" id="fundNameDisplay">---</div>
    <div class="system-actions">
      <span class="sys-btn" onclick="exportData()">Backup</span>
      <span class="sys-btn" onclick="importData()">Restore</span>
    </div>
  </div>

  <div class="hero-block">
    <div class="status-badge-wrapper">
      <div id="statusBadge" class="status-badge">LIVE INDEX</div>
    </div>
    <div class="val-main" id="mainValDisplay">¥0</div>
  </div>

  <div class="stats-layout">
    <div class="stat-card">
      <span class="stat-label">Day / Margin</span>
      <span class="stat-num" id="dayValDisplay">---</span>
      <span class="stat-per" id="dayPctDisplay">---</span>
    </div>
    <div class="stat-card">
      <span class="stat-label">Total / Yield</span>
      <span class="stat-num" id="totalValDisplay">---</span>
      <span class="stat-per" id="totalPctDisplay">---</span>
    </div>
  </div>

  <div class="chart-container">
    <div class="chart-meta-row">
      <span class="chart-headline">Historical Performance</span>
      <div class="period-selector">
        <button class="p-tab" onclick="setPeriod('1M')">1M</button>
        <button class="p-tab" onclick="setPeriod('3M')">3M</button>
        <button class="p-tab" onclick="setPeriod('6M')">6M</button>
        <button class="p-tab active" onclick="setPeriod('ALL')">ALL</button>
      </div>
    </div>
    <div class="canvas-wrapper" id="canvasWrapper"></div>
  </div>

  <div class="dashboard-list" id="dashboardGrid"></div>
</div>

<div class="bottom-dock">
  <button id="updateBtn" class="action-trigger" onclick="fetchAll()">
    <span id="updateLabel">Synchronize Archive</span>
  </button>
</div>

<div id="toast" class="toast"></div>

<script>
const GAS_API_URL = "https://script.google.com/macros/s/AKfycby2CVXP9e34KWPbe8tFqhjvnznaq03Z8R-EoWLZeafce3PY_aet8nzEd0MlTj77YZM9/exec";
const SK = "money_log_sox_v2";
const MORPH_SAMPLES = 40;

// ── State Management ──
const DEFAULT = { name: "楽天・プラス・SOX", code: "2931123A", price: 19391, holding: 59845, cost: 121180, isNisa: true, diff: null };
let stock = (() => { try { const s = localStorage.getItem(SK); return s ? { ...DEFAULT, ...JSON.parse(s) } : { ...DEFAULT }; } catch { return { ...DEFAULT }; } })();
let history = (() => { try { const h = localStorage.getItem(SK + "_hist"); return h ? JSON.parse(h) : []; } catch { return []; } })();
let activePeriod = "ALL";
let editingField = null;
let isUpdating = false;
let lastSyncTime = localStorage.getItem(SK + "_sync") || "--:--";

function save() { localStorage.setItem(SK, JSON.stringify(stock)); }
function saveHistory() { localStorage.setItem(SK + "_hist", JSON.stringify(history)); }

// ── Financial Calculators ──
function getValuation(p = stock.price) { return p * stock.holding / 10000; }
function getUnrealizedPnL(v) { return v - stock.cost; }
function getUnrealizedRate(pnl) { return stock.cost > 0 ? (pnl / stock.cost * 100) : 0; }
function getAvgCost() { return stock.holding > 0 ? stock.cost / stock.holding * 10000 : 0; }

// ── String Formatters ──
const fmtYen = v => v === null || !isFinite(v) ? "---" : "¥" + Math.round(v).toLocaleString();
const fmtSign = v => { if (v === null || !isFinite(v)) return "---"; const r = Math.round(v); return (r >= 0 ? "+" : "") + r.toLocaleString(); };
const fmtPct = v => v === null || !isFinite(v) ? "---" : (v >= 0 ? "+" : "") + v.toFixed(2) + "%";
const fmtNum = (v, d=0) => v === null || !isFinite(v) ? "---" : Number(v).toLocaleString(undefined, {minimumFractionDigits:d, maximumFractionDigits:d});

// ── UI Components ──
let _toastTimer;
function showToast(msg) {
  const t = document.getElementById("toast"); t.textContent = msg; t.classList.add("show");
  clearTimeout(_toastTimer); _toastTimer = setTimeout(() => t.classList.remove("show"), 1400);
}

function exportData() {
  const b = { stock: localStorage.getItem(SK), hist: localStorage.getItem(SK + "_hist"), sync: localStorage.getItem(SK + "_sync") };
  navigator.clipboard.writeText(JSON.stringify(b)).then(() => showToast("Archive token copied")).catch(() => showToast("Failed"));
}
function importData() {
  const str = prompt("トークンを入力してください:"); if (!str) return;
  try {
    const b = JSON.parse(str);
    if (b.stock) localStorage.setItem(SK, b.stock); if (b.hist) localStorage.setItem(SK + "_hist", b.hist); if (b.sync) localStorage.setItem(SK + "_sync", b.sync);
    showToast("Restored successfully."); setTimeout(() => location.reload(), 1000);
  } catch { showToast("Error"); }
}

function startEdit(f) { editingField = f; render(); requestAnimationFrame(() => { const el = document.getElementById("input-" + f); if (el) { el.focus(); el.select(); } }); }
function finishEdit(f, v) { const n = parseFloat(v); if (!isNaN(n) && isFinite(n)) { stock[f] = n; save(); showToast("Updated"); } editingField = null; render(); }

function recordTodayPnL() {
  const today = new Date().toISOString().slice(0, 10);
  const pnl = Math.round(getUnrealizedPnL(getValuation()));
  const idx = history.findIndex(h => h.date === today);
  if (idx >= 0) history[idx].pnl = pnl; else history.push({ date: today, pnl });
  if (history.length > 180) history = history.slice(-180);
  saveHistory();
}

function getResampledHistory() {
  if (!history.length) return [];
  const now = new Date(); let cutoff = null;
  if (activePeriod === "1M") { cutoff = new Date(now); cutoff.setMonth(cutoff.getMonth() - 1); }
  else if (activePeriod === "3M") { cutoff = new Date(now); cutoff.setMonth(cutoff.getMonth() - 3); }
  else if (activePeriod === "6M") { cutoff = new Date(now); cutoff.setMonth(cutoff.getMonth() - 6); }
  
  let filtered = [...history].sort((a,b) => a.date.localeCompare(b.date));
  if (cutoff) filtered = filtered.filter(h => new Date(h.date) >= cutoff);
  if (filtered.length === 0) return [];
  if (filtered.length === 1) return Array(MORPH_SAMPLES).fill(0).map(() => ({ date: filtered[0].date, pnl: filtered[0].pnl }));

  const resampled = [];
  for (let i = 0; i < MORPH_SAMPLES; i++) {
    const rawIdx = (i / (MORPH_SAMPLES - 1)) * (filtered.length - 1);
    const low = Math.floor(rawIdx); const high = Math.ceil(rawIdx); const weight = rawIdx - low;
    const pnlItem = Math.round(filtered[low].pnl + (filtered[high].pnl - filtered[low].pnl) * weight);
    resampled.push({ date: filtered[high].date, pnl: pnlItem });
  }
  return resampled;
}

// ── Blueprint Graphics Architecture ──
let chartPoints = [];

function injectChartStructure() {
  const data = getResampledHistory();
  const wrapper = document.getElementById("canvasWrapper");
  if (data.length < 2) { wrapper.innerHTML = `<div class="chart-empty">No Index Data Compiled</div>`; return; }

  const vals = data.map(d => d.pnl);
  const minV = Math.min(...vals); const maxV = Math.max(...vals); const range = maxV - minV || 1;
  const W = 500, H = 150, PAD = 4;

  chartPoints = data.map((d, i) => {
    const x = (i / (data.length - 1)) * W;
    const y = PAD + (1 - (d.pnl - minV) / range) * (H - PAD * 2);
    return { x, y, date: d.date, pnl: d.pnl };
  });

  const pathD = chartPoints.map((p, i) => (i === 0 ? `M${p.x},${p.y}` : `L${p.x},${p.y}`)).join(" ");
  const lastPnl = history[history.length - 1]?.pnl ?? 0;
  const colorLine = lastPnl >= 0 ? "var(--pos)" : "var(--neg)";

  const svgElement = document.getElementById("interactiveSvg");
  if (!svg
