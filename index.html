<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>MONEY LOG v3.2</title>
<style>
:root {
  --bg-color: #f2f2f7; --card-bg: #ffffff; --text-main: #1c1c1e; --text-sub: #8e8e93; 
  --radius: 16px; --input-bg: #f9f9fb; --input-border: #e5e5ea;
  --accent: #007aff; --pos-color: #34c759; --neg-color: #ff3b30; --nisa-color: #34c759; --tax-color: #ff9500;
}
body { font-family: -apple-system, sans-serif; background: var(--bg-color); margin: 0; padding: 12px; color: var(--text-main); line-height: 1.2; padding-bottom: 80px; }
.container { max-width: 420px; margin: 0 auto; }

.progress-box {
background: var(–card-bg);
color: var(–text-main);
border-radius: 20px;
padding: 20px;
margin-bottom: 15px;
text-align: center;
box-shadow: 0 4px 15px rgba(0,0,0,0.05);
border-left: 5px solid var(–text-main);
}
.progress-bar-container { background: #e5e5ea; height: 6px; border-radius: 3px; margin: 12px 0; overflow: hidden; }
#progressBar { background: var(–accent); height: 100%; width: 0%; transition: width 0.5s ease-out; }
.total-val { font-size: 34px; font-weight: 800; display: block; margin: 4px 0; letter-spacing: -1px; }
.summary-stats { display: flex; justify-content: center; gap: 15px; font-size: 13px; font-weight: 700; margin-bottom: 12px; }

.payout-box {
background: #fff9e6;
padding: 10px;
border-radius: 12px;
margin-top: 12px;
}
.payout-val { font-size: 16px; font-weight: 700; color: #b8860b; }

.stock-card { background: var(–card-bg); border-radius: var(–radius); padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); position: relative; overflow: hidden; }
.nisa-tag { font-size: 10px; font-weight: bold; padding: 2px 8px; border-radius: 6px; }
.tag-nisa { background: #e1f7e6; color: var(–nisa-color); }
.tag-taxable { background: #fff4e5; color: var(–tax-color); }

.stock-name { font-weight: 800; font-size: 15px; }

.main-price { font-size: 24px; font-weight: 800; margin-top: 4px; }
.input-grid { display: grid; grid-template-columns: 1fr 1fr 1.1fr; gap: 8px; margin-top: 12px; }
.input-label { font-size: 10px; color: var(–text-sub); margin-bottom: 3px; display: block; font-weight: 600; }
.ios-input { width: 100%; box-sizing: border-box; padding: 8px; font-size: 14px; border: 1px solid var(–input-border); border-radius: 10px; background: var(–input-bg); -webkit-appearance: none; font-weight: 600; }
.ios-input:focus { outline: none; border-color: var(–accent); background: #fff; }

/* holding=0のとき警告スタイル */
.ios-input.warn { border-color: var(–neg-color); background: #fff5f5; }

.btn-update {
background: var(–card-bg);
color: var(–accent);
border: none;
padding: 18px;
border-radius: var(–radius);
width: 100%;
font-size: 16px;
font-weight: 700;
cursor: pointer;
box-shadow: 0 2px 8px rgba(0,0,0,0.05);
transition: all 0.2s ease;
display: flex;
justify-content: center;
align-items: center;
gap: 8px;
margin-top: 10px;
border-left: 5px solid var(–accent);
}
.btn-update:active { background: #ebebeb; transform: scale(0.98); }
.btn-update:disabled { opacity: 0.5; pointer-events: none; }

/* 最終更新時刻 */
.last-updated { font-size: 10px; color: var(–text-sub); text-align: center; margin-top: 6px; }

/* fetch失敗バナー */
.error-banner { background: #fff0f0; color: var(–neg-color); font-size: 12px; font-weight: 700; padding: 8px 12px; border-radius: 10px; margin-bottom: 10px; display: none; }

@keyframes spin { 100% { transform: rotate(360deg); } }
.loading-icon { display: inline-block; animation: spin 1s linear infinite; }
</style>

</head>
<body>
<div class="container">

  <div id="errorBanner" class="error-banner"></div>

  <div class="progress-box">
    <div style="font-size:10px; color:var(--text-sub); display:flex; justify-content:space-between; font-weight:bold;">
      <div>
        <span>Project 10M</span>
        <span id="progRate" style="margin-left:4px;">(0%)</span>
      </div>
      <div>
        <span id="fxRateDisplay" style="color:var(--text-main);">USD/JPY: ---</span>
      </div>
    </div>
    <div class="progress-bar-container"><div id="progressBar"></div></div>

<div class="stock-name" style="color:var(--text-main); margin-bottom:4px;">Total Assets</div>
<span id="totalDisplay" class="total-val">¥0</span>

<div class="summary-stats">
  <span id="totalDayDiff">--</span>
  <span id="totalProfitAll">--</span>
</div>

<div class="payout-box">
  <div style="font-size:10px; color:#b8860b; font-weight:700; margin-bottom:2px;">Net (Est.)</div>
  <div id="payoutDisplay" class="payout-val">¥0</div>
</div>

  </div>

  <div id="stockList"></div>

  <button id="updateBtn" class="btn-update" onclick="fetchAll()">
    <span id="updateIcon">↻</span> update
  </button>
  <div id="lastUpdated" class="last-updated"></div>

</div>

<script>
const GAS_API_URL = "https://script.google.com/macros/s/AKfycbyBwS13vfLF_Ndut84W1Sjujp538VOoSNa_18dtxJOqT4y6ubnpOEVm6aUTLzksI6sl/exec";
const STORAGE_KEY = "money_log_v3.2";

// --- スキーマのデフォルト値（マイグレーション用）---
const ITEM_DEFAULTS = {
  diff: null,   // nullにしてfetch前と後を区別
  rate: null,
};

function migrateData(raw) {
  if (!Array.isArray(raw)) return null;
  return raw.map(item => ({ ...ITEM_DEFAULTS, ...item }));
}

// --- 初期データ ---
const INITIAL_DATA = [
  { name: "楽天・プラス・SOX", code: "2931123A", price: 19391, holding: 59845, cost: 121180, isStock: false, isNisa: true, diff: null },
  { name: "PayPay", code: "PAYP", price: 23.04, holding: 1.86131, cost: 4749, isStock: true, isNisa: false, rate: null, diff: null }
];

// ローカルストレージからロード（マイグレーション付き）
let data = (() => {
  try {
    const raw = JSON.parse(localStorage.getItem(STORAGE_KEY));
    return migrateData(raw) || INITIAL_DATA;
  } catch (e) {
    return INITIAL_DATA;
  }
})();

// USD/JPY: 前回fetchで得た値を保持、なければnull（固定値に頼らない）
let currentUsdJpy = (() => {
  const saved = localStorage.getItem(STORAGE_KEY + "_usd");
  return saved ? parseFloat(saved) : null;
})();

// --- Fetch ---
async function fetchAll() {
  const btn = document.getElementById('updateBtn');
  const icon = document.getElementById('updateIcon');
  btn.disabled = true;
  icon.classList.add('loading-icon');
  hideError();

  const errors = [];

  await Promise.all(data.map(async (s) => {
    try {
      const res = await fetch(`${GAS_API_URL}?code=${s.code}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();
      if (json.status === "Success") {
        s.price = json.price;
        s.diff = json.diff ?? null;
        if (json.rate) {
          s.rate = json.rate;
          currentUsdJpy = json.rate;
          localStorage.setItem(STORAGE_KEY + "_usd", String(json.rate));
        }
      } else {
        errors.push(`${s.name}: データ取得失敗`);
      }
    } catch (e) {
      errors.push(`${s.name}: 通信エラー`);
    }
  }));

  btn.disabled = false;
  icon.classList.remove('loading-icon');

  if (errors.length > 0) showError(errors.join(' / '));

  // 最終更新時刻を記録
  const now = new Date();
  const timeStr = now.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  document.getElementById('lastUpdated').textContent = `最終更新: ${timeStr}`;

  saveAndRender();
}

function showError(msg) {
  const el = document.getElementById('errorBanner');
  el.textContent = `⚠️ ${msg}`;
  el.style.display = 'block';
}
function hideError() {
  document.getElementById('errorBanner').style.display = 'none';
}

// --- 保存 & 描画 ---
function saveAndRender() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch (e) {
    showError('データ保存に失敗しました（ストレージ容量不足の可能性）');
  }
  render();
}

// --- 評価額計算 ---
function calcValuation(s) {
  if (s.isStock) {
    // 株式: price(USD) × rate × holding口数
    const rate = s.rate ?? currentUsdJpy;
    if (!rate) return null; // レートが一度も取得できていない場合はnull
    return Math.floor(s.price * rate * s.holding);
  } else {
    // 投資信託: NAV(円/10000口) × holding(口数) ÷ 10000
    // holding単位: 口（例: 59845口 → 59845/10000口分のNAVで評価）
    return Math.floor(s.price * s.holding / 10000);
  }
}

// --- 描画 ---
function render() {
  const list = document.getElementById('stockList');
  let totalValue = 0, totalCost = 0, dayDiffSum = 0, taxableProfit = 0;
  let hasRateWarning = false;

  list.innerHTML = data.map((s, i) => {
    const valuation = calcValuation(s);
    const valuationDisplay = valuation !== null ? valuation : 0;
    totalValue += valuationDisplay;
    totalCost += s.cost;

    // 前日差分: diffがnull（未取得）の場合は表示しない
    const hasDiff = s.diff !== null && s.diff !== undefined;
    const dVal = hasDiff ? Math.floor(valuationDisplay * (parseFloat(s.diff) / 100)) : null;
    if (dVal !== null) dayDiffSum += dVal;

    const totalProfit = valuationDisplay - s.cost;
    const totalProfitRate = s.cost > 0 ? (totalProfit / s.cost * 100).toFixed(2) : '0.00';
    if (!s.isNisa) taxableProfit += totalProfit;

    // レートが未取得の株式はUI上で警告
    const rateUnavailable = s.isStock && !s.rate && !currentUsdJpy;
    if (rateUnavailable) hasRateWarning = true;

    // holding=0警告
    const holdingWarn = s.holding === 0;

    const prevDiffHtml = hasDiff
      ? `<div style="font-size:12px; font-weight:bold; color:${dVal >= 0 ? 'var(--pos-color)' : 'var(--neg-color)'}">
           Prev: ${dVal >= 0 ? '+' : ''}${dVal.toLocaleString()} (${parseFloat(s.diff).toFixed(2)}%)
         </div>`
      : `<div style="font-size:12px; color:var(--text-sub);">Prev: ---</div>`;

    return `
      <div class="stock-card" style="border-left: 5px solid ${s.isNisa ? 'var(--nisa-color)' : 'var(--tax-color)'}">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <span class="stock-name">${s.name}</span>
          <span class="nisa-tag ${s.isNisa ? 'tag-nisa' : 'tag-taxable'}">${s.isNisa ? 'NISA' : '特定'}</span>
        </div>
        <div style="display:flex; justify-content:space-between; align-items: flex-end; margin-top:4px;">
          <span class="main-price">${valuation !== null ? '¥' + valuationDisplay.toLocaleString() : '¥---'}</span>
          <div style="text-align:right">
            ${prevDiffHtml}
            <div style="font-size:11px; font-weight:bold; color:${totalProfit >= 0 ? 'var(--pos-color)' : 'var(--neg-color)'}">
              Total: ${totalProfit >= 0 ? '+' : ''}${totalProfit.toLocaleString()} (${totalProfitRate}%)
            </div>
          </div>
        </div>
        <div class="input-grid">
          <div><span class="input-label">${s.isStock ? 'Price($)' : 'NAV(¥)'}</span>
            <input class="ios-input" type="number" step="any" inputmode="decimal" value="${s.price}"
              onchange="updateItem(${i},'price',this.value)">
          </div>
          <div><span class="input-label">Qty${s.isStock ? '' : '(口)'}</span>
            <input class="ios-input ${holdingWarn ? 'warn' : ''}" type="number" step="any" inputmode="decimal" value="${s.holding}"
              onchange="updateItem(${i},'holding',this.value)">
          </div>
          <div><span class="input-label">Cost(¥)</span>
            <input class="ios-input" type="number" step="any" inputmode="decimal" value="${s.cost}"
              onchange="updateItem(${i},'cost',this.value)">
          </div>
        </div>
        ${rateUnavailable ? '<div style="font-size:10px; color:var(--neg-color); margin-top:6px;">⚠️ USD/JPY未取得 — updateで更新してください</div>' : ''}
      </div>`;
  }).join('');

  // --- サマリー ---
  const overallProfit = totalValue - totalCost;
  const overallProfitRate = totalCost > 0 ? (overallProfit / totalCost * 100).toFixed(2) : '0.00';

  // 前日差分：1件でもdiffが取得済みの場合のみ表示
  const anyDiff = data.some(s => s.diff !== null);
  const prevBase = totalValue - dayDiffSum;
  const dayRate = anyDiff && prevBase > 0 ? (dayDiffSum / prevBase * 100).toFixed(2) : null;

  document.getElementById('totalDisplay').textContent = `¥${totalValue.toLocaleString()}`;
  document.getElementById('fxRateDisplay').textContent = currentUsdJpy
    ? `USD/JPY: ¥${currentUsdJpy.toFixed(2)}`
    : 'USD/JPY: ---';

  const dayEl = document.getElementById('totalDayDiff');
  if (anyDiff && dayRate !== null) {
    dayEl.style.color = dayDiffSum >= 0 ? 'var(--pos-color)' : 'var(--neg-color)';
    dayEl.textContent = `Prev: ${dayDiffSum >= 0 ? '+' : ''}${dayDiffSum.toLocaleString()} (${dayRate}%)`;
  } else {
    dayEl.style.color = 'var(--text-sub)';
    dayEl.textContent = 'Prev: ---';
  }

  const profEl = document.getElementById('totalProfitAll');
  profEl.style.color = overallProfit >= 0 ? 'var(--pos-color)' : 'var(--neg-color)';
  profEl.textContent = `Total: ${overallProfit >= 0 ? '+' : ''}${overallProfit.toLocaleString()} (${overallProfitRate}%)`;

  const estTax = taxableProfit > 0 ? Math.floor(taxableProfit * 0.20315) : 0;
  document.getElementById('payoutDisplay').innerHTML =
    `¥${(totalValue - estTax).toLocaleString()} <span style="font-size:10px; opacity:0.7; font-weight:normal;">(Tax: ¥${estTax.toLocaleString()})</span>`;

  const prog = Math.min((totalValue / 10000000) * 100, 100);
  document.getElementById('progRate').textContent = `(${prog.toFixed(2)}%)`;
  document.getElementById('progressBar').style.width = prog + '%';
}

// --- 入力更新 ---
function updateItem(i, field, val) {
  const parsed = parseFloat(val);
  // NaN or 空入力 → 元の値を保持（0にしない）
  if (!isNaN(parsed)) {
    data[i][field] = parsed;
    saveAndRender();
  }
}

// 初回描画
render();
</script>

</body>
</html>
