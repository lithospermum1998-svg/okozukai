<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>MONEY LOG v2.3 - 1000万への道</title>
<style>
:root {
  --bg-color: #f2f2f7; --card-bg: #ffffff; --text-main: #1c1c1e; --text-sub: #8e8e93; 
  --radius: 20px; --input-bg: #ffffff; --input-border: #e5e5ea;
  --accent: #007aff; --pos-color: #34c759; --neg-color: #ff3b30;
}
body { font-family: -apple-system, sans-serif; background: var(--bg-color); margin: 0; padding: 12px; color: var(--text-main); }
.container { max-width: 420px; margin: 0 auto; }

/* 進捗バー（v2.3の黒デザインを継承） */
.progress-box { background: #1c1c1e; color: white; border-radius: 15px; padding: 15px; margin-bottom: 12px; }
.progress-label { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 8px; opacity: 0.8; }
.progress-track { background: #3a3a3c; border-radius: 10px; height: 10px; overflow: hidden; }
.progress-fill { background: linear-gradient(90deg, #007aff, #34c759); height: 100%; width: 0%; transition: width 2s ease-in-out; }

/* 資産セクション見出し */
.section-header { display: flex; justify-content: space-between; align-items: center; padding: 0 5px; margin-bottom: 8px; }
.section-title { font-size: 14px; font-weight: 800; color: var(--text-sub); }
.section-title::before { content: "|"; color: var(--text-sub); margin-right: 8px; }

/* 初期版に寄せたカードレイアウト */
.stock-card { background: var(--card-bg); border-radius: var(--radius); padding: 20px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
.stock-name { font-weight: bold; font-size: 15px; margin-bottom: 12px; line-height: 1.4; }

.price-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
.main-price { font-size: 28px; font-weight: 800; }
.day-diff { font-size: 14px; font-weight: bold; }

.return-row { font-size: 13px; color: var(--text-sub); margin-bottom: 15px; }

/* 入力グリッド（ラベルが上） */
.input-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.input-group { display: flex; flex-direction: column; gap: 4px; }
.input-label { font-size: 10px; color: var(--text-sub); text-align: center; }
.ios-input { width: 100%; box-sizing: border-box; padding: 10px 5px; font-size: 13px; border: 1px solid var(--input-border); border-radius: 10px; background: var(--input-bg); text-align: center; font-weight: 500; }

.btn-update { background: #636366; color: white; border: none; padding: 6px 14px; border-radius: 15px; font-size: 11px; font-weight: bold; }
</style>
</head>
<body>
<div class="container">
  <div class="progress-box">
    <div class="progress-label"><span>1,000万円プロジェクト進捗</span><span id="progressPercent">0%</span></div>
    <div class="progress-track"><div id="progressBar" class="progress-fill"></div></div>
    <div id="totalAssetsDisplay" style="text-align:center; font-size:24px; font-weight:800; margin-top:10px;">¥0</div>
  </div>

  <div class="section-header">
    <span class="section-title">ASSETS</span>
    <button class="btn-update" onclick="fetchAllPrices()">更新</button>
  </div>
  
  <div id="stockList"></div>
</div>

<script>
const GAS_API_URL = "https://script.google.com/macros/s/AKfycbzqAE-_Q1JcW_fH-DiqMxB_QSB6WqknRlSPteVMLoztGZM7fYLHzZeNrM6xhRryQ-KW/exec";

// 初期銘柄設定（画像15のPayPay証券と現在の楽天SOXに同期）
let savedData = JSON.parse(localStorage.getItem('stocks')) || [
  { name: "楽天・プラス・SOXインデックス・ファンド", code: "2931123A", price: 19994, holding: 13000, cost: 25000, isStock: false },
  { name: "PayPay株", code: "PAYP", price: 3950, holding: 1.86131, cost: 4749, isStock: true }
];

async function fetchAllPrices() {
  const btn = document.querySelector('.btn-update');
  btn.textContent = "更新中...";
  for (let s of savedData) {
    try {
      const res = await fetch(`${GAS_API_URL}?code=${s.code}`);
      const data = await res.json();
      if (data.status === "Success") { s.price = data.price; s.diff = data.diff; }
    } catch (e) { console.error(e); }
  }
  btn.textContent = "更新";
  saveAndRender();
}

function saveAndRender() {
  localStorage.setItem('stocks', JSON.stringify(savedData));
  render();
}

function render() {
  const container = document.getElementById('stockList');
  let total = 0;
  
  container.innerHTML = savedData.map((s, i) => {
    const val = s.isStock ? Math.floor(s.price * s.holding) : Math.floor((s.price * s.holding) / 10000);
    total += val;
    const profit = val - s.cost;
    const profitRate = s.cost ? (profit / s.cost * 100).toFixed(2) : "0.00";
    
    // 前日比の計算（簡易計算）
    const dayDiffVal = Math.floor(val * (parseFloat(s.diff || 0) / 100));

    return `
      <div class="stock-card">
        <div class="stock-name">${s.name}</div>
        <div class="price-row">
          <span class="main-price">¥${val.toLocaleString()}</span>
          <span class="day-diff ${s.diff >= 0 ? 'pos' : 'neg'}" style="color:${s.diff >= 0 ? 'var(--pos-color)' : 'var(--neg-color)'}">
            ${dayDiffVal >= 0 ? '+' : ''}${dayDiffVal.toLocaleString()} (${s.diff || 0}%)
          </span>
        </div>
        <div class="return-row">
          Total Return: <span style="color:${profit >= 0 ? 'var(--pos-color)' : 'var(--neg-color)'}">
            ${profit >= 0 ? '+' : ''}${profit.toLocaleString()} (${profitRate}%)
          </span>
        </div>
        <div class="input-grid">
          <div class="input-group">
            <span class="input-label">${s.isStock ? '現在値' : '基準価額'}</span>
            <input class="ios-input" type="number" value="${s.price}" onchange="update(${i},'price',this.value)">
          </div>
          <div class="input-group">
            <span class="input-label">${s.isStock ? '保有株数' : '保有口数'}</span>
            <input class="ios-input" type="number" value="${s.holding}" onchange="update(${i},'holding',this.value)">
          </div>
          <div class="input-group">
            <span class="input-label">元本</span>
            <input class="ios-input" type="number" value="${s.cost}" onchange="update(${i},'cost',this.value)">
          </div>
        </div>
      </div>`;
  }).join('');

  document.getElementById('totalAssetsDisplay').textContent = `¥${total.toLocaleString()}`;
  const prog = Math.min((total / 10000000) * 100, 100);
  document.getElementById('progressPercent').textContent = prog.toFixed(2) + "%";
  document.getElementById('progressBar').style.width = prog + "%";
}

function update(i, f, v) { savedData[i][f] = parseFloat(v) || 0; saveAndRender(); }
render();
</script>
</body>
</html>
