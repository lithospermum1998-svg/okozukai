<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>MONEY LOG v3.1</title>
<style>
:root {
  --bg-color: #f2f2f7; --card-bg: #ffffff; --text-main: #1c1c1e; --text-sub: #8e8e93; 
  --radius: 16px; --input-bg: #f9f9fb; --input-border: #e5e5ea;
  --accent: #007aff; --pos-color: #34c759; --neg-color: #ff3b30; --nisa-color: #34c759; --tax-color: #ff9500;
}
body { font-family: -apple-system, sans-serif; background: var(--bg-color); margin: 0; padding: 12px; color: var(--text-main); line-height: 1.2; padding-bottom: 80px; }
.container { max-width: 420px; margin: 0 auto; }
.progress-box { background: #1c1c1e; color: white; border-radius: 20px; padding: 20px; margin-bottom: 15px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
.progress-bar-container { background: #3a3a3c; height: 6px; border-radius: 3px; margin: 12px 0; overflow: hidden; }
#progressBar { background: var(--accent); height: 100%; width: 0%; transition: width 0.5s ease-out; }
.total-val { font-size: 34px; font-weight: 800; display: block; margin: 4px 0; letter-spacing: -1px; }
.summary-stats { display: flex; justify-content: center; gap: 15px; font-size: 13px; font-weight: 700; margin-bottom: 12px; }
.payout-val { font-size: 16px; font-weight: 700; color: #ffd60a; }

.stock-card { background: var(--card-bg); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); position: relative; overflow: hidden; }
.nisa-tag { font-size: 10px; font-weight: bold; padding: 2px 8px; border-radius: 6px; }
.tag-nisa { background: #e1f7e6; color: var(--nisa-color); }
.tag-taxable { background: #fff4e5; color: var(--tax-color); }

.stock-name { font-weight: 800; font-size: 15px; }
.main-price { font-size: 24px; font-weight: 800; margin-top: 4px; }
.input-grid { display: grid; grid-template-columns: 1fr 1fr 1.1fr; gap: 8px; margin-top: 12px; }
.input-label { font-size: 10px; color: var(--text-sub); margin-bottom: 3px; display: block; font-weight: 600; }
.ios-input { width: 100%; box-sizing: border-box; padding: 8px; font-size: 14px; border: 1px solid var(--input-border); border-radius: 10px; background: var(--input-bg); -webkit-appearance: none; font-weight: 600; }

.btn-update { background: #636366; color: white; border: none; padding: 18px; border-radius: 16px; width: 100%; font-size: 16px; font-weight: 700; cursor: pointer; transition: background 0.2s; }
@keyframes spin { 100% { transform: rotate(360deg); } }
.loading span { display: inline-block; animation: spin 1s linear infinite; }
</style>
</head>
<body>
<div class="container">
  <div class="progress-box">
    <div style="font-size:10px; opacity:0.7; display:flex; justify-content:space-between; font-weight:bold;">
      <div>
        <span>Project 10M</span>
        <span id="progRate" style="margin-left:4px;">(0%)</span>
      </div>
      <div>
        <span id="fxRateDisplay" style="color:#ffffff;">USD/JPY: ---</span>
      </div>
    </div>
    <div class="progress-bar-container"><div id="progressBar"></div></div>
    
    <div style="font-size:12px; opacity:0.8; font-weight:700; margin-bottom:-2px;">Total Assets</div>
    <span id="totalDisplay" class="total-val">¥0</span>
    
    <div class="summary-stats">
      <span id="totalDayDiff">--</span>
      <span id="totalProfitAll">--</span>
    </div>
    
    <div style="padding-top:12px; border-top:1px solid rgba(255,255,255,0.15)">
      <div style="font-size:10px; color:#ffd60a; font-weight:700; margin-bottom:2px;">Net (Est.)</div>
      <div id="payoutDisplay" class="payout-val">¥0</div>
    </div>
  </div>

  <div id="stockList"></div>
  <button id="updateBtn" class="btn-update" onclick="fetchAll()"><span>↻</span> update</button>
</div>

<script>
const GAS_API_URL = "https://script.google.com/macros/s/AKfycbyBwS13vfLF_Ndut84W1Sjujp538VOoSNa_18dtxJOqT4y6ubnpOEVm6aUTLzksI6sl/exec"; 
const STORAGE_KEY = "money_log_v3.1_final";

let data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [
  { name: "楽天・プラス・SOX", code: "2931123A", price: 19391, holding: 59845, cost: 121180, isStock: false, isNisa: true, diff: 0 },
  { name: "PayPay", code: "PAYP", price: 23.04, holding: 1.86131, cost: 4749, isStock: true, isNisa: false, rate: 160, diff: 0 }
];

let currentUsdJpy = 160.00;

async function fetchAll() {
  const btn = document.getElementById('updateBtn');
  btn.classList.add('loading');
  btn.innerHTML = '<span>↻</span> updating...';
  try {
    await Promise.all(data.map(async (s) => {
      try {
        const res = await fetch(`${GAS_API_URL}?code=${s.code}`);
        const json = await res.json();
        if (json.status === "Success") {
          s.price = json.price; s.diff = json.diff;
          if (json.rate) { s.rate = json.rate; currentUsdJpy = json.rate; }
        }
      } catch (e) { console.error(e); }
    }));
  } finally {
    btn.classList.remove('loading');
    btn.innerHTML = '<span>↻</span> update';
    saveAndRender();
  }
}

function saveAndRender() { 
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); 
  render(); 
}

function render() {
  const list = document.getElementById('stockList');
  let totalValue = 0, totalCost = 0, dayDiffSum = 0, taxableProfit = 0;

  list.innerHTML = data.map((s, i) => {
    const currentPriceYen = s.isStock ? (s.price * (s.rate || currentUsdJpy)) : s.price;
    const valuation = s.isStock ? Math.floor(currentPriceYen * s.holding) : Math.floor(currentPriceYen * s.holding / 10000);
    totalValue += valuation; totalCost += s.cost;
    const dVal = Math.floor(valuation * (parseFloat(s.diff || 0) / 100));
    dayDiffSum += dVal;
    const totalProfit = valuation - s.cost;
    const totalProfitRate = s.cost > 0 ? (totalProfit / s.cost * 100).toFixed(2) : 0;
    if (!s.isNisa) taxableProfit += totalProfit;

    return `
      <div class="stock-card" style="border-left: 5px solid ${s.isNisa ? 'var(--nisa-color)' : 'var(--tax-color)'}">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <span class="stock-name">${s.name}</span>
          <span class="nisa-tag ${s.isNisa ? 'tag-nisa' : 'tag-taxable'}">${s.isNisa ? 'NISA' : '特定'}</span>
        </div>
        <div style="display:flex; justify-content:space-between; align-items: flex-end; margin-top:4px;">
          <span class="main-price">¥${valuation.toLocaleString()}</span>
          <div style="text-align:right">
            <div style="font-size:12px; font-weight:bold; color:${s.diff >= 0 ? 'var(--pos-color)' : 'var(--neg-color)'}">
              Prev: ${dVal >= 0 ? '+' : ''}${dVal.toLocaleString()} (${parseFloat(s.diff || 0).toFixed(2)}%)
            </div>
            <div style="font-size:11px; font-weight:bold; color:${totalProfit >= 0 ? 'var(--pos-color)' : 'var(--neg-color)'}">
              Total: ${totalProfit >= 0 ? '+' : ''}${totalProfit.toLocaleString()} (${totalProfitRate}%)
            </div>
          </div>
        </div>
        <div class="input-grid">
          <div class="input-group"><span class="input-label">${s.isStock ? "Price($)" : "NAV(¥)"}</span>
            <input class="ios-input" type="number" step="any" inputmode="decimal" value="${s.price}" onchange="updateItem(${i},'price',this.value)">
          </div>
          <div class="input-group"><span class="input-label">Qty</span>
            <input class="ios-input" type="number" step="any" inputmode="decimal" value="${s.holding}" onchange="updateItem(${i},'holding',this.value)">
          </div>
          <div class="input-group"><span class="input-label">Cost(¥)</span>
            <input class="ios-input" type="number" step="any" inputmode="decimal" value="${s.cost}" onchange="updateItem(${i},'cost',this.value)">
          </div>
        </div>
      </div>`;
  }).join('');

  const overallProfit = totalValue - totalCost;
  const overallProfitRate = totalCost > 0 ? (overallProfit / totalCost * 100).toFixed(2) : 0;
  const dayRate = (totalValue - dayDiffSum) > 0 ? (dayDiffSum / (totalValue - dayDiffSum) * 100).toFixed(2) : 0;

  document.getElementById('totalDisplay').textContent = `¥${totalValue.toLocaleString()}`;
  document.getElementById('fxRateDisplay').textContent = `USD/JPY: ¥${currentUsdJpy.toFixed(2)}`;
  
  const dayEl = document.getElementById('totalDayDiff');
  dayEl.style.color = dayDiffSum >= 0 ? 'var(--pos-color)' : 'var(--neg-color)';
  dayEl.textContent = `Prev: ${dayDiffSum >= 0 ? '+' : ''}${dayDiffSum.toLocaleString()} (${dayRate}%)`;

  const profEl = document.getElementById('totalProfitAll');
  profEl.style.color = overallProfit >= 0 ? 'var(--pos-color)' : 'var(--neg-color)';
  profEl.textContent = `Total: ${overallProfit >= 0 ? '+' : ''}${overallProfit.toLocaleString()} (${overallProfitRate}%)`;

  const estTax = taxableProfit > 0 ? Math.floor(taxableProfit * 0.20315) : 0;
  document.getElementById('payoutDisplay').innerHTML = `¥${(totalValue - estTax).toLocaleString()} <span style="font-size:10px; opacity:0.7; font-weight:normal;">(Tax: ¥${estTax.toLocaleString()})</span>`;
  
  const prog = Math.min((totalValue / 10000000) * 100, 100);
  document.getElementById('progRate').textContent = "(" + prog.toFixed(2) + "%)";
  document.getElementById('progressBar').style.width = prog + "%";
}

function updateItem(i, field, val) { data[i][field] = parseFloat(val) || 0; saveAndRender(); }
render();
</script>
</body>
</html>
