<body>
  <div class="container">
    <div class="top-head">
      <div class="app-title-wrap">
        <h1 class="app-title">MONEY LOG</h1>
        <div class="app-sub">PERSONAL PORTFOLIO</div>
      </div>
      <div class="sync-pill">
        <span class="sync-dot"></span>
        <span id="lastSyncDisplay">Last Sync: --:--</span>
      </div>
    </div>

    <div id="summaryCards" class="list-container"></div>

    <div class="section-row">
      <h2 class="section-title">Portfolio</h2>
    </div>
    <div id="stockList" class="list-container"></div>
  </div>

  <div class="bottom-bar">
    <button id="updateBtn" class="update-btn" onclick="fetchAll()">
      <span id="updateIcon" class="update-icon">↻</span>
      <span id="updateLabel" class="update-label">update</span>
    </button>
  </div>

  <div id="toast" class="toast">Saved</div>

<script>
const GAS_API_URL = "https://script.google.com/macros/s/AKfycby2CVXP9e34KWPbe8tFqhjvnznaq03Z8R-EoWLZeafce3PY_aet8nzEd0MlTj77YZM9/exec";
const STORAGE_KEY = "money_log_compact_ios";

const INITIAL_DATA = [
  { name: "楽天・プラス・SOX", code: "2931123A", price: 19391, holding: 59845, cost: 121180, isStock: false, isNisa: true, diff: null },
  { name: "NASDAQ100ゴールドプラス", code: "02311251", price: 18700, holding: 0, cost: 3000, isStock: false, isNisa: false, diff: null },
  { name: "PayPay", code: "PAYP", price: 23.04, holding: 1.86131, cost: 4749, isStock: true, isNisa: false, rate: null, diff: null }
];

function safeLoadJSON(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch (e) {
    return fallback;
  }
}

let data = safeLoadJSON(STORAGE_KEY, INITIAL_DATA);
let currentUsdJpy = parseFloat(localStorage.getItem(STORAGE_KEY + "_usd")) || null;
let lastSyncTime = localStorage.getItem(STORAGE_KEY + "_sync") || "--:--";
let editingCell = { index: null, field: null };
let isUpdating = false;

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function formatYen(v) {
  if (v === null || !isFinite(v)) return "---";
  return "¥" + Math.round(v).toLocaleString();
}

function formatSigned(v) {
  if (v === null || !isFinite(v)) return "---";
  const rounded = Math.round(v);
  return (rounded >= 0 ? "+" : "") + rounded.toLocaleString();
}

function formatPct(v) {
  if (v === null || !isFinite(v)) return "---";
  return (v >= 0 ? "+" : "") + v.toFixed(2) + "%";
}

function formatPlain(v, digits = 0) {
  if (v === null || !isFinite(v)) return "---";
  return Number(v).toLocaleString(undefined, {
    minimumFractionDigits: digits,
    maximumFractionDigits: digits
  });
}

function trimTrailingZeros(str) {
  return str.replace(/(\.\d*?[1-9])0+$/, "$1").replace(/\.0+$/, "");
}

function calcValuation(item) {
  if (item.isStock) {
    const rate = item.rate ?? currentUsdJpy;
    return rate ? item.price * rate * item.holding : null;
  }
  return item.price * item.holding / 10000;
}

function showToast(message) {
  const toast = document.getElementById("toast");
  toast.textContent = message;
  toast.classList.add("show");
  clearTimeout(showToast._timer);
  showToast._timer = setTimeout(() => {
    toast.classList.remove("show");
  }, 1300);
}

function startEdit(index, field) {
  editingCell = { index, field };
  render();

  requestAnimationFrame(() => {
    const input = document.getElementById(`input-${index}-${field}`);
    if (input) {
      input.focus();
      input.select();
    }
  });
}

function finishEdit(index, field, value) {
  const num = parseFloat(value);
  if (!Number.isNaN(num) && Number.isFinite(num)) {
    data[index][field] = num;
    saveData();
    showToast("Saved");
  }
  editingCell = { index: null, field: null };
  render();
}

function escapeHtml(str) {
  return String(str)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

async function fetchAll() {
  if (isUpdating) return;
  isUpdating = true;

  const btn = document.getElementById("updateBtn");
  const icon = document.getElementById("updateIcon");
  const label = document.getElementById("updateLabel");

  btn.disabled = true;
  label.textContent = "updating";

  const anim = icon.animate(
    [{ transform: "rotate(0deg)" }, { transform: "rotate(360deg)" }],
    { duration: 900, iterations: Infinity, easing: "linear" }
  );

  let successCount = 0;
  let failCount = 0;

  await Promise.all(
    data.map(async (item) => {
      try {
        const res = await fetch(`${GAS_API_URL}?code=${encodeURIComponent(item.code)}`, { cache: "no-store" });
        const json = await res.json();

        if (json.status === "Success") {
          item.price = json.price;
          item.diff = json.diff ?? null;

          if (json.rate) {
            currentUsdJpy = json.rate;
            localStorage.setItem(STORAGE_KEY + "_usd", String(json.rate));
          }
          successCount++;
        } else {
          failCount++;
        }
      } catch (e) {
        failCount++;
      }
    })
  );

  if (successCount > 0) {
    const now = new Date();
    lastSyncTime = now.getHours() + ":" + String(now.getMinutes()).padStart(2, "0");
    localStorage.setItem(STORAGE_KEY + "_sync", lastSyncTime);
    saveData();
  }

  render();
  anim.cancel();

  if (successCount > 0 && failCount === 0) {
    label.textContent = "updated";
    showToast("Updated");
  } else if (successCount > 0 && failCount > 0) {
    label.textContent = "partial";
    showToast(`${failCount} item failed`);
  } else {
    label.textContent = "failed";
    showToast("Update failed");
  }

  setTimeout(() => {
    label.textContent = "update";
    btn.disabled = false;
    isUpdating = false;
  }, 1100);
}

function render() {
  const list = document.getElementById("stockList");
  const summary = document.getElementById("summaryCards");
  const syncDisplay = document.getElementById("lastSyncDisplay");

  syncDisplay.textContent = "Last Sync: " + lastSyncTime;

  let totalValue = 0;
  let totalCost = 0;
  let dayDiffSum = 0;
  let taxableProfit = 0;

  data.forEach(item => {
    const rawVal = calcValuation(item);
    const val = rawVal || 0;

    totalValue += val;
    totalCost += item.cost;

    if (item.diff !== null && isFinite(item.diff)) {
      dayDiffSum += val * (parseFloat(item.diff) / 100);
    }

    if (!item.isNisa) {
      const itemProfit = val - item.cost;
      if (itemProfit > 0) taxableProfit += itemProfit;
    }
  });

  const estTax = taxableProfit > 0 ? taxableProfit * 0.20315 : 0;
  const netValue = totalValue - estTax;
  const netGain = netValue - totalCost;
  const netGainRate = totalCost > 0 ? (netGain / totalCost * 100) : 0;

  const dayDiffPrefix = dayDiffSum === 0 ? "" : (dayDiffSum > 0 ? "+" : "-");
  const dayDiffDisplay = formatSigned(Math.abs(dayDiffSum)).replace(/^\+/, dayDiffPrefix);

  summary.innerHTML = `
    <section class="stock-card summary-card">
      <div class="card-top">
        <div class="card-title-block">
          <div class="card-label">Total Assets</div>
          <div class="card-sub-label">Summary</div>
        </div>
      </div>

      <div class="card-main">
        <div class="value-main numeric">${formatYen(totalValue)}</div>
        <div class="performance-wrap">
          <div class="performance-line numeric ${dayDiffSum >= 0 ? "pos" : "neg"}">
            Day&nbsp; ${dayDiffDisplay}
          </div>
          <div class="performance-line numeric ${netGain >= 0 ? "pos" : "neg"}">
            Total&nbsp; ${formatPct(netGainRate)}
          </div>
        </div>
      </div>

      <div class="summary-meta-grid">
        <div class="meta-item">
          <div class="meta-label">After Tax</div>
          <div class="meta-value numeric">${formatYen(netValue)}</div>
        </div>
        <div class="meta-item">
          <div class="meta-label">Est. Tax</div>
          <div class="meta-value numeric">${formatYen(estTax)}</div>
        </div>
        <div class="meta-item">
          <div class="meta-label">Invested</div>
          <div class="meta-value numeric">${formatYen(totalCost)}</div>
        </div>
        <div class="meta-item">
          <div class="meta-label">Net Gain</div>
          <div class="meta-value numeric ${netGain >= 0 ? "pos" : "neg"}">${formatSigned(netGain)}</div>
        </div>
      </div>
    </section>
  `;

  list.innerHTML = data.map((item, index) => {
    const rawVal = calcValuation(item);
    const val = rawVal || 0;
    const profit = val - item.cost;
    const profitRate = item.cost > 0 ? (profit / item.cost * 100) : 0;
    const dayDiffValue = item.diff !== null ? val * (parseFloat(item.diff) / 100) : null;

    const renderInline = (field, val, display) => {
      if (editingCell.index === index && editingCell.field === field) {
        return `
          <input
            id="input-${index}-${field}"
            class="inline-input"
            type="number"
            step="any"
            value="${escapeHtml(val)}"
            onblur="finishEdit(${index}, '${field}', this.value)"
            onkeydown="if(event.key==='Enter') this.blur()"
          >
        `;
      }
      return `<div onclick="startEdit(${index}, '${field}')">${display}</div>`;
    };

    const holdingDisplay = trimTrailingZeros(
      formatPlain(item.holding, item.holding % 1 === 0 ? 0 : 5)
    );

    const itemDayPrefix = dayDiffValue === null || dayDiffValue === 0 ? "" : (dayDiffValue > 0 ? "+" : "-");
    const itemDayDisplay = dayDiffValue === null
      ? "---"
      : formatSigned(Math.abs(dayDiffValue)).replace(/^\+/, itemDayPrefix);

    return `
      <section class="stock-card">
        <div class="card-top">
          <div class="card-title-block">
            <div class="card-label">${escapeHtml(item.name)}</div>
            <div class="card-sub-label numeric">${escapeHtml(item.code)}</div>
          </div>
          <div class="account-badge">${item.isNisa ? "NISA" : "特定"}</div>
        </div>

        <div class="card-main">
          <div class="value-main numeric">${formatYen(val)}</div>
          <div class="performance-wrap">
            <div class="performance-line numeric ${dayDiffValue === null ? "neutral" : (dayDiffValue >= 0 ? "pos" : "neg")}">
              Day&nbsp; ${dayDiffValue === null ? "---" : itemDayDisplay}
            </div>
            <div class="performance-line numeric ${profit >= 0 ? "pos" : "neg"}">
              Total&nbsp; ${formatPct(profitRate)}
            </div>
          </div>
        </div>

        <div class="meta-grid">
          <div class="meta-item">
            <div class="meta-label">${item.isStock ? "USD" : "NAV"}</div>
            <div class="meta-value numeric">${item.isStock ? formatPlain(item.price, 2) : formatPlain(item.price, 0)}</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">Qty</div>
            <div class="meta-value numeric">${renderInline("holding", item.holding, holdingDisplay)}</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">Cost</div>
            <div class="meta-value numeric">${renderInline("cost", item.cost, formatYen(item.cost))}</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">FX</div>
            <div class="meta-value numeric">${item.isStock && currentUsdJpy ? "¥" + currentUsdJpy.toFixed(1) : "-"}</div>
          </div>
        </div>
      </section>
    `;
  }).join("");
}

render();
</script>
</body>
</html>
