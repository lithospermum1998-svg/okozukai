<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"
/>
<meta name="theme-color" content="#000000" />
<title>MONEY LOG v3.1 Direct Edit</title>

<style>
:root {
  --bg: #000000;
  --surface-1: #1c1c1e;
  --surface-2: #2c2c2e;
  --surface-3: #3a3a3c;
  --surface-4: #48484a;

  --text-main: #ffffff;
  --text-sub: #8e8e93;
  --text-soft: #636366;

  --line: rgba(255,255,255,0.07);
  --line-strong: rgba(255,255,255,0.12);

  --accent: #0a84ff;
  --accent-soft: rgba(10,132,255,0.16);

  --pos: #30d158;
  --neg: #ff453a;
  --warn: #ffd60a;

  --radius-xl: 24px;
  --radius-lg: 18px;
  --radius-md: 14px;
  --radius-sm: 12px;

  --shadow-soft: 0 10px 30px rgba(0,0,0,0.28);
  --shadow-float: 0 12px 30px rgba(0,0,0,0.35);
}

* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  margin: 0;
  background: var(--bg);
  color: var(--text-main);
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", sans-serif;
}

body {
  min-height: 100vh;
  padding:
    calc(10px + env(safe-area-inset-top))
    14px
    calc(110px + env(safe-area-inset-bottom));
  line-height: 1.2;
}

.container {
  max-width: 430px;
  margin: 0 auto;
}

.numeric {
  font-variant-numeric: tabular-nums;
  font-feature-settings: "tnum";
}

/* Header */
.app-header {
  padding: 6px 4px 14px;
}

.app-title {
  font-size: 34px;
  font-weight: 800;
  letter-spacing: -0.8px;
  margin: 0;
}

.app-subtitle {
  margin-top: 4px;
  font-size: 13px;
  color: var(--text-sub);
  font-weight: 500;
}

/* Error */
.error-banner {
  display: none;
  margin-bottom: 12px;
  padding: 12px 14px;
  border-radius: 16px;
  background: rgba(255, 69, 58, 0.14);
  border: 1px solid rgba(255, 69, 58, 0.22);
  color: #ff9b94;
  font-size: 12px;
  font-weight: 700;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}

/* Summary */
.summary-card {
  background:
    linear-gradient(180deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.01) 100%),
    var(--surface-1);
  border: 1px solid var(--line);
  border-radius: 28px;
  padding: 18px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.04), var(--shadow-soft);
  margin-bottom: 16px;
}

.summary-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
}

.summary-badge {
  display: inline-flex;
  align-items: center;
  height: 26px;
  padding: 0 10px;
  border-radius: 999px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.07);
  color: var(--text-main);
  font-size: 11px;
  font-weight: 700;
}

.total-display {
  font-size: 38px;
  font-weight: 800;
  letter-spacing: -1.1px;
  margin: 0 0 14px;
}

.progress-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
  color: var(--text-sub);
  font-size: 11px;
  font-weight: 700;
}

.progress-track {
  height: 8px;
  background: rgba(255,255,255,0.08);
  border-radius: 999px;
  overflow: hidden;
  margin-bottom: 14px;
}

.progress-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #ffffff 0%, #d0d0d0 100%);
  transition: width 0.55s cubic-bezier(.2,.8,.2,1);
}

.summary-stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 12px;
}

.stat-chip {
  padding: 10px 12px;
  background: rgba(255,255,255,0.045);
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.06);
}

.stat-chip-label {
  font-size: 10px;
  color: var(--text-sub);
  text-transform: uppercase;
  margin-bottom: 6px;
}

.stat-chip-value {
  font-size: 13px;
  font-weight: 800;
}

.net-card {
  border-radius: 18px;
  padding: 12px 14px;
  background: var(--surface-2);
  border: 1px solid var(--line);
}

.net-card-label {
  font-size: 10px;
  color: var(--text-sub);
  font-weight: 700;
}

.net-card-value {
  font-size: 18px;
  font-weight: 800;
}

.net-card-tax {
  font-size: 11px;
  color: var(--text-sub);
  margin-top: 4px;
}

/* Portfolio Section */
.section-title {
  margin: 18px 4px 12px;
  font-size: 20px;
  font-weight: 800;
}

.stock-card {
  position: relative;
  border-radius: 22px;
  padding: 16px;
  background: var(--surface-1);
  border: 1px solid var(--line);
  margin-bottom: 14px;
  overflow: hidden;
}

.stock-card::before {
  content: "";
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 5px;
  background: var(--brand, #3a3a3c);
}

.stock-header {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}

.stock-name {
  font-size: 16px;
  font-weight: 800;
}

.stock-code {
  font-size: 11px;
  color: var(--text-sub);
}

.account-badge {
  height: 26px;
  padding: 0 10px;
  border-radius: 999px;
  background: rgba(255,255,255,0.06);
  font-size: 11px;
  font-weight: 800;
  display: flex;
  align-items: center;
}

.stock-main {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  margin-bottom: 12px;
}

.stock-value {
  font-size: 30px;
  font-weight: 800;
}

.stock-performance {
  text-align: right;
  font-size: 12px;
  font-weight: 800;
}

/* Direct Input Meta Rows */
.view-meta {
  display: grid;
  gap: 4px;
}

.meta-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  min-height: 40px;
  border-top: 1px solid rgba(255,255,255,0.06);
}

.meta-label {
  color: var(--text-sub);
  font-size: 12px;
  font-weight: 700;
}

/* 改良された入力フィールド */
.ios-direct-input {
  background: transparent;
  border: none;
  color: var(--text-main);
  font-family: inherit;
  font-size: 14px;
  font-weight: 800;
  text-align: right;
  width: 150px;
  padding: 8px 10px;
  border-radius: 8px;
  outline: none;
  transition: background 0.2s, box-shadow 0.2s;
  -webkit-appearance: none;
}

.ios-direct-input:focus {
  background: var(--surface-3);
  box-shadow: 0 0 0 1px var(--accent);
}

.ios-direct-input.warn {
  color: var(--neg);
}

/* Bottom Bar */
.bottom-bar {
  position: fixed;
  left: 0; right: 0;
  bottom: calc(14px + env(safe-area-inset-bottom));
  display: flex;
  justify-content: center;
  pointer-events: none;
  z-index: 100;
}

.update-btn {
  pointer-events: auto;
  height: 54px;
  padding: 0 24px;
  border-radius: 999px;
  background: rgba(255,255,255,0.88);
  color: #000;
  font-size: 16px;
  font-weight: 800;
  backdrop-filter: blur(20px);
  border: none;
  box-shadow: 0 10px 28px rgba(0,0,0,0.34);
}

.pos { color: var(--pos); }
.neg { color: var(--neg); }

@keyframes spin { to { transform: rotate(360deg); } }
.loading-icon { animation: spin 1s linear infinite; display: inline-block; }
</style>
</head>

<body>
  <div class="container">
    <header class="app-header">
      <h1 class="app-title">資産</h1>
      <div class="app-subtitle">MONEY LOG v3.1</div>
    </header>

    <div id="errorBanner" class="error-banner"></div>

    <section class="summary-card">
      <div class="summary-top">
        <div class="summary-badge numeric">Project 10M</div>
        <div id="fxRateDisplay" class="summary-badge numeric">USD/JPY: ---</div>
      </div>

      <div class="summary-label">Total Assets</div>
      <div id="totalDisplay" class="total-display numeric">¥0</div>

      <div class="progress-meta">
        <span>Goal Progress</span>
        <span id="progRate" class="numeric">(0.00%)</span>
      </div>
      <div class="progress-track"><div id="progressBar" class="progress-fill"></div></div>

      <div class="summary-stats">
        <div class="stat-chip">
          <div class="stat-chip-label">Previous Day</div>
          <div id="totalDayDiff" class="stat-chip-value numeric">---</div>
        </div>
        <div class="stat-chip">
          <div class="stat-chip-label">Total Profit</div>
          <div id="totalProfitAll" class="stat-chip-value numeric">---</div>
        </div>
      </div>

      <div class="net-card">
        <div class="net-card-label">Net (Est.)</div>
        <div id="payoutDisplay" class="net-card-value numeric">¥0</div>
        <div id="taxNote" class="net-card-tax numeric">Tax: ¥0</div>
      </div>
      <div id="lastUpdated" class="last-updated" style="margin-top:12px; text-align:center; font-size:11px; color:var(--text-soft);">最終更新: --:--:--</div>
    </section>

    <div class="section-title">Portfolio</div>
    <div id="stockList" class="stock-list"></div>
  </div>

  <div class="bottom-bar">
    <button id="updateBtn" class="update-btn" onclick="fetchAll()">
      <span id="updateIcon">↻</span> Update Prices
    </button>
  </div>

<script>
const GAS_API_URL = "https://script.google.com/macros/s/AKfycbyNWxHLVUfBd2_sYdZ-0AuoZkBElRCyNrJN36B08y8QO3wUqy7IVAb_WjqO4umUvb7a/exec";
const STORAGE_KEY = "money_log_v3_ios_edit";

const INITIAL_DATA = [
  { name: "楽天・プラス・SOX", code: "2931123A", price: 19391, holding: 59845, cost: 121180, isStock: false, isNisa: true, diff: null },
  { name: "NASDAQ100ゴールドプラス", code: "02311251", price: 18700, holding: 0, cost: 3000, isStock: false, isNisa: true, diff: null },
  { name: "PayPay", code: "PAYP", price: 23.04, holding: 1.86131, cost: 4749, isStock: true, isNisa: false, rate: null, diff: null }
];

const BRAND_COLORS = { "2931123A": "#8b0000", "02311251": "#d4af37", "PAYP": "#ff3b30" };

let data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || INITIAL_DATA;
let currentUsdJpy = parseFloat(localStorage.getItem(STORAGE_KEY + "_usd")) || 150.00;

function formatYen(v) { return "¥" + Math.floor(v).toLocaleString("ja-JP"); }
function formatSigned(v) { return (v > 0 ? "+" : "") + Math.floor(v).toLocaleString("ja-JP"); }
function formatPercent(v) { return (v > 0 ? "+" : "") + v.toFixed(2) + "%"; }

function saveAndRender() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  render();
}

function updateItem(index, field, value) {
  const parsed = parseFloat(value);
  if (!isNaN(parsed)) {
    data[index][field] = parsed;
    saveAndRender();
  }
}

async function fetchAll() {
  const icon = document.getElementById("updateIcon");
  icon.classList.add("loading-icon");
  
  await Promise.all(data.map(async (item) => {
    try {
      const res = await fetch(`${GAS_API_URL}?code=${item.code}`);
      const json = await res.json();
      if (json.status === "Success") {
        item.price = json.price;
        item.diff = json.diff ?? null;
        if (json.rate) {
          currentUsdJpy = json.rate;
          localStorage.setItem(STORAGE_KEY + "_usd", currentUsdJpy);
        }
      }
    } catch (e) { console.error(e); }
  }));

  icon.classList.remove("loading-icon");
  document.getElementById("lastUpdated").textContent = `最終更新: ${new Date().toLocaleTimeString()}`;
  saveAndRender();
}

function render() {
  const list = document.getElementById("stockList");
  let totalValue = 0, totalCost = 0, dayDiffSum = 0, taxableProfit = 0;

  list.innerHTML = data.map((item, index) => {
    const rate = item.isStock ? (item.rate ?? currentUsdJpy) : 1;
    const valuation = item.isStock ? (item.price * rate * item.holding) : (item.price * item.holding / 10000);
    
    totalValue += valuation;
    totalCost += item.cost;
    
    const hasDiff = item.diff !== null;
    const dayDiffValue = hasDiff ? Math.floor(valuation * (item.diff / 100)) : 0;
    if (hasDiff) dayDiffSum += dayDiffValue;
    
    const profit = valuation - item.cost;
    const profitRate = item.cost > 0 ? (profit / item.cost * 100) : 0;
    if (!item.isNisa) taxableProfit += profit;

    return `
      <section class="stock-card" style="--brand:${BRAND_COLORS[item.code] || '#3a3a3c'}">
        <div class="stock-header">
          <div class="stock-name-wrap">
            <div class="stock-name">${item.name}</div>
            <div class="stock-code numeric">${item.code}</div>
          </div>
          <div class="account-badge">${item.isNisa ? "NISA" : "特定"}</div>
        </div>

        <div class="stock-main">
          <div class="stock-value numeric">${formatYen(valuation)}</div>
          <div class="stock-performance">
            <div class="${dayDiffValue >= 0 ? 'pos' : 'neg'} numeric">
              Prev: ${hasDiff ? formatSigned(dayDiffValue) + ' (' + formatPercent(item.diff) + ')' : '---'}
            </div>
            <div class="${profit >= 0 ? 'pos' : 'neg'} numeric" style="margin-top:4px">
              Total: ${formatSigned(profit)} (${formatPercent(profitRate)})
            </div>
          </div>
        </div>

        <div class="view-meta">
          <div class="meta-row">
            <div class="meta-label">${item.isStock ? "Price ($)" : "NAV"}</div>
            <input class="ios-direct-input numeric" type="number" step="any" inputmode="decimal" 
              value="${item.price}" onchange="updateItem(${index}, 'price', this.value)">
          </div>
          <div class="meta-row">
            <div class="meta-label">Qty</div>
            <input class="ios-direct-input numeric ${item.holding === 0 ? 'warn' : ''}" type="number" step="any" inputmode="decimal" 
              value="${item.holding}" onchange="updateItem(${index}, 'holding', this.value)">
          </div>
          <div class="meta-row">
            <div class="meta-label">Cost (¥)</div>
            <input class="ios-direct-input numeric" type="number" step="any" inputmode="decimal" 
              value="${item.cost}" onchange="updateItem(${index}, 'cost', this.value)">
          </div>
          <div class="meta-row">
            <div class="meta-label">FX</div>
            <div class="meta-value numeric" style="padding-right:10px; font-size:14px; font-weight:800;">
              ${item.isStock ? '¥' + currentUsdJpy.toFixed(2) : '-'}
            </div>
          </div>
        </div>
      </section>
    `;
  }).join("");

  // Summary Update
  document.getElementById("totalDisplay").textContent = formatYen(totalValue);
  document.getElementById("fxRateDisplay").textContent = `USD/JPY: ¥${currentUsdJpy.toFixed(2)}`;
  
  const anyDiff = data.some(item => item.diff !== null);
  const totalDayRate = (anyDiff && (totalValue - dayDiffSum) > 0) ? (dayDiffSum / (totalValue - dayDiffSum) * 100) : 0;
  const dayEl = document.getElementById("totalDayDiff");
  dayEl.textContent = anyDiff ? `${formatSigned(dayDiffSum)} (${formatPercent(totalDayRate)})` : "---";
  dayEl.className = "stat-chip-value numeric " + (dayDiffSum >= 0 ? "pos" : "neg");

  const overallProfit = totalValue - totalCost;
  const overallProfitRate = totalCost > 0 ? (overallProfit / totalCost * 100) : 0;
  const profEl = document.getElementById("totalProfitAll");
  profEl.textContent = `${formatSigned(overallProfit)} (${formatPercent(overallProfitRate)})`;
  profEl.className = "stat-chip-value numeric " + (overallProfit >= 0 ? "pos" : "neg");

  const estTax = taxableProfit > 0 ? Math.floor(taxableProfit * 0.20315) : 0;
  document.getElementById("payoutDisplay").textContent = formatYen(totalValue - estTax);
  document.getElementById("taxNote").textContent = `Tax: ¥${estTax.toLocaleString()}`;

  const progress = Math.min((totalValue / 10000000) * 100, 100);
  document.getElementById("progRate").textContent = `(${progress.toFixed(2)}%)`;
  document.getElementById("progressBar").style.width = progress + "%";
}

render();
</script>
</body>
</html>
