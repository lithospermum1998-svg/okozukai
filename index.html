<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"
/>
<meta name="theme-color" content="#000000" />
<title>MONEY LOG iOS Direct Edit</title>

<style>
:root {
  --bg: #000000;
  --surface-1: #1c1c1e;
  --surface-2: #2c2c2e;
  --surface-3: #3a3a3c;
  --surface-4: #48484a;

  --text-main: #ffffff;
  --text-sub: #8e8e93;
  --text-soft: #636366;

  --line: rgba(255,255,255,0.07);
  --line-strong: rgba(255,255,255,0.12);

  --accent: #0a84ff;
  --accent-soft: rgba(10,132,255,0.16);

  --pos: #30d158;
  --neg: #ff453a;
  --warn: #ffd60a;

  --radius-xl: 24px;
  --radius-lg: 18px;
  --radius-md: 14px;
  --radius-sm: 12px;

  --shadow-soft: 0 10px 30px rgba(0,0,0,0.28);
}

* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  margin: 0;
  background: var(--bg);
  color: var(--text-main);
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", sans-serif;
}

body {
  min-height: 100vh;
  padding:
    calc(10px + env(safe-area-inset-top))
    14px
    calc(110px + env(safe-area-inset-bottom));
}

.container {
  max-width: 430px;
  margin: 0 auto;
}

.numeric {
  font-variant-numeric: tabular-nums;
  font-feature-settings: "tnum";
}

/* Header */
.app-header {
  padding: 6px 4px 14px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}

.app-title {
  font-size: 34px;
  font-weight: 800;
  letter-spacing: -0.8px;
  margin: 0;
}

.app-subtitle {
  margin-top: 4px;
  font-size: 13px;
  color: var(--text-sub);
  font-weight: 500;
}

/* Summary Card */
.summary-card {
  background: linear-gradient(180deg, rgba(255,255,255,0.04) 0%, var(--surface-1) 100%);
  border: 1px solid var(--line);
  border-radius: 28px;
  padding: 18px;
  margin-bottom: 16px;
  box-shadow: var(--shadow-soft);
}

.total-display {
  font-size: 38px;
  font-weight: 800;
  letter-spacing: -1.1px;
  margin: 10px 0;
}

.progress-track {
  height: 8px;
  background: rgba(255,255,255,0.08);
  border-radius: 999px;
  margin: 10px 0;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: #fff;
  transition: width 0.5s ease;
}

.summary-stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin: 12px 0;
}

.stat-chip {
  padding: 12px;
  background: rgba(255,255,255,0.045);
  border-radius: 16px;
  border: 1px solid var(--line);
}

.stat-chip-label {
  font-size: 10px;
  color: var(--text-sub);
  text-transform: uppercase;
  margin-bottom: 4px;
}

.stat-chip-value {
  font-size: 13px;
  font-weight: 800;
}

/* Stock Card */
.stock-card {
  position: relative;
  overflow: hidden;
  border-radius: 22px;
  padding: 16px;
  background: var(--surface-1);
  border: 1px solid var(--line);
  margin-bottom: 14px;
}

.stock-card::before {
  content: "";
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 5px;
  background: var(--brand, #3a3a3c);
}

.stock-header {
  display: flex;
  justify-content: space-between;
  margin-bottom: 12px;
}

.stock-name {
  font-size: 16px;
  font-weight: 800;
}

.stock-value {
  font-size: 30px;
  font-weight: 800;
  margin-bottom: 12px;
}

/* Direct Input Style */
.meta-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
  border-top: 1px solid rgba(255,255,255,0.06);
}

.meta-label {
  color: var(--text-sub);
  font-size: 12px;
  font-weight: 700;
}

.ios-direct-input {
  background: transparent;
  border: none;
  color: var(--text-main);
  font-family: inherit;
  font-size: 14px;
  font-weight: 800;
  text-align: right;
  width: 50%;
  padding: 6px 8px;
  border-radius: 8px;
  outline: none;
  transition: background 0.2s, box-shadow 0.2s;
}

.ios-direct-input:focus {
  background: var(--surface-3);
  box-shadow: 0 0 0 1px var(--accent);
}

.ios-direct-input::-webkit-outer-spin-button,
.ios-direct-input::-webkit-inner-spin-button {
  -webkit-appearance: none;
  margin: 0;
}

/* Bottom Bar */
.bottom-bar {
  position: fixed;
  bottom: calc(20px + env(safe-area-inset-bottom));
  left: 0; right: 0;
  display: flex;
  justify-content: center;
  z-index: 100;
}

.update-btn {
  background: #fff;
  color: #000;
  border: none;
  padding: 14px 28px;
  border-radius: 999px;
  font-size: 16px;
  font-weight: 800;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.pos { color: var(--pos); }
.neg { color: var(--neg); }
</style>
</head>

<body>
  <div class="container">
    <header class="app-header">
      <div>
        <h1 class="app-title">資産</h1>
        <div class="app-subtitle">MONEY LOG v3.1</div>
      </div>
    </header>

    <section class="summary-card">
      <div id="totalDisplay" class="total-display numeric">¥0</div>
      <div class="progress-track"><div id="progressBar" class="progress-fill"></div></div>
      <div class="summary-stats">
        <div class="stat-chip">
          <div class="stat-chip-label">Previous Day</div>
          <div id="totalDayDiff" class="stat-chip-value numeric">---</div>
        </div>
        <div class="stat-chip">
          <div class="stat-chip-label">Total Profit</div>
          <div id="totalProfitAll" class="stat-chip-value numeric">---</div>
        </div>
      </div>
    </section>

    <div id="stockList"></div>
  </div>

  <div class="bottom-bar">
    <button class="update-btn" onclick="fetchAll()">Update Prices ↻</button>
  </div>

<script>
const GAS_API_URL = "https://script.google.com/macros/s/AKfycbyNWxHLVUfBd2_sYdZ-0AuoZkBElRCyNrJN36B08y8QO3wUqy7IVAb_WjqO4umUvb7a/exec";
const STORAGE_KEY = "money_log_v3_direct";

let data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [
  { name: "楽天・プラス・SOX", code: "2931123A", price: 19391, holding: 59845, cost: 121180, isStock: false, isNisa: true, diff: 0 },
  { name: "NASDAQ100ゴールドプラス", code: "02311251", price: 18700, holding: 0, cost: 3000, isStock: false, isNisa: true, diff: 0 },
  { name: "PayPay", code: "PAYP", price: 23.04, holding: 1.86131, cost: 4749, isStock: true, isNisa: false, rate: 150.00, diff: 0 }
];

const BRAND_COLORS = { "2931123A": "#8b0000", "02311251": "#d4af37", "PAYP": "#ff3b30" };

function updateItem(index, field, value) {
  data[index][field] = parseFloat(value) || 0;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  render();
}

async function fetchAll() {
  await Promise.all(data.map(async (item) => {
    try {
      const res = await fetch(`${GAS_API_URL}?code=${item.code}`);
      const json = await res.json();
      if (json.status === "Success") {
        item.price = json.price;
        item.diff = json.diff || 0;
        if (json.rate) item.rate = json.rate;
      }
    } catch (e) { console.error("Fetch error", e); }
  }));
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  render();
}

function render() {
  const list = document.getElementById("stockList");
  let totalValue = 0, totalCost = 0, dayDiffSum = 0;

  list.innerHTML = data.map((item, index) => {
    const valuation = item.isStock ? (item.price * (item.rate || 150) * item.holding) : (item.price * item.holding / 10000);
    totalValue += valuation;
    totalCost += item.cost;
    const dayDiff = valuation * (item.diff / 100);
    dayDiffSum += dayDiff;

    return `
      <div class="stock-card" style="--brand:${BRAND_COLORS[item.code] || '#3a3a3c'}">
        <div class="stock-header">
          <span class="stock-name">${item.name}</span>
          <span class="numeric" style="font-size:11px; color:var(--text-sub)">${item.isNisa ? 'NISA' : '特定'}</span>
        </div>
        <div class="stock-value numeric">¥${Math.floor(valuation).toLocaleString()}</div>
        
        <div class="meta-row">
          <div class="meta-label">${item.isStock ? 'Price ($)' : 'NAV'}</div>
          <input class="ios-direct-input numeric" type="number" step="any" inputmode="decimal" value="${item.price}" onchange="updateItem(${index}, 'price', this.value)">
        </div>
        <div class="meta-row">
          <div class="meta-label">Quantity</div>
          <input class="ios-direct-input numeric" type="number" step="any" inputmode="decimal" value="${item.holding}" onchange="updateItem(${index}, 'holding', this.value)">
        </div>
        <div class="meta-row">
          <div class="meta-label">Cost (¥)</div>
          <input class="ios-direct-input numeric" type="number" step="any" inputmode="decimal" value="${item.cost}" onchange="updateItem(${index}, 'cost', this.value)">
        </div>
      </div>
    `;
  }).join("");

  document.getElementById("totalDisplay").textContent = "¥" + Math.floor(totalValue).toLocaleString();
  document.getElementById("totalDayDiff").textContent = (dayDiffSum >= 0 ? "+" : "") + Math.floor(dayDiffSum).toLocaleString();
  document.getElementById("totalDayDiff").className = "stat-chip-value numeric " + (dayDiffSum >= 0 ? "pos" : "neg");
  
  const profit = totalValue - totalCost;
  document.getElementById("totalProfitAll").textContent = (profit >= 0 ? "+" : "") + Math.floor(profit).toLocaleString();
  document.getElementById("totalProfitAll").className = "stat-chip-value numeric " + (profit >= 0 ? "pos" : "neg");

  const progress = Math.min((totalValue / 10000000) * 100, 100);
  document.getElementById("progressBar").style.width = progress + "%";
}

render();
</script>
</body>
</html>
