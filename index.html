<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>MONEY LOG v2.3 - Sophisticated</title>
<style>
:root {
  --bg-color: #f2f2f7; --card-bg: #ffffff; --text-main: #1c1c1e; --text-sub: #8e8e93; 
  --radius: 16px; --input-bg: #f9f9fb; --input-border: #e5e5ea;
  --accent: #007aff; --pos-color: #34c759; --neg-color: #ff3b30;
}
body { font-family: -apple-system, sans-serif; background: var(--bg-color); margin: 0; padding: 12px; color: var(--text-main); line-height: 1.2; }
.container { max-width: 420px; margin: 0 auto; }

/* 🛠️ 一番上の島：黒を抑えたチャコールグレーへ */
.progress-box { background: #2c2c2e; color: white; border-radius: 14px; padding: 15px; margin-bottom: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
.progress-label { display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 8px; opacity: 0.6; }
.progress-track { background: #48484a; border-radius: 6px; height: 8px; overflow: hidden; }
.progress-fill { background: linear-gradient(90deg, #007aff, #34c759); height: 100%; width: 0%; transition: width 1.5s ease-out; }

/* 統一された価格表示スタイル */
.price-display { margin-top: 8px; text-align: center; }
.total-val { font-size: 26px; font-weight: 800; display: block; }
.sub-stats { font-size: 12px; font-weight: bold; margin-top: 2px; }
.total-return-label { font-size: 11px; opacity: 0.7; margin-top: 4px; display: block; }

/* セクション見出し */
.section-header { display: flex; justify-content: space-between; align-items: center; padding: 0 4px; margin-bottom: 8px; }
.section-title { font-size: 12px; font-weight: 800; color: var(--text-sub); }
.section-title::before { content: "|"; color: var(--text-sub); margin-right: 6px; }

/* クルクル更新ボタン */
.btn-update { background: #636366; color: white; border: none; padding: 5px 12px; border-radius: 12px; font-size: 10px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 4px; }
@keyframes spin { 100% { transform: rotate(360deg); } }
.loading span { display: inline-block; animation: spin 1s linear infinite; }

/* カードデザイン */
.stock-card { background: var(--card-bg); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
.stock-name { font-weight: 800; font-size: 16px; margin-bottom: 6px; display: block; letter-spacing: -0.5px; }

.price-row { display: flex; align-items: baseline; gap: 6px; margin-bottom: 2px; }
.main-price { font-size: 24px; font-weight: 800; }
.day-diff { font-size: 12px; font-weight: bold; }
.return-row { font-size: 11px; color: var(--text-sub); margin-bottom: 12px; }

/* 入力グリッド */
.input-grid { display: grid; grid-template-columns: 1fr 1fr 1.1fr; gap: 8px; }
.input-group { display: flex; flex-direction: column; gap: 3px; }
.input-label { font-size: 9px; color: var(--text-sub); text-align: left; padding-left: 2px; }
.ios-input { width: 100%; box-sizing: border-box; padding: 5px 8px; font-size: 13px; border: 1px solid var(--input-border); border-radius: 9px; background: var(--input-bg); text-align: left; font-weight: 400; color: #3a3a3c; height: 28px; }
</style>
</head>
<body>
<div class="container">
  <div class="progress-box">
    <div class="progress-label"><span>1,000万円プロジェクト進捗</span><span id="progressPercent">0%</span></div>
    <div class="progress-track"><div id="progressBar" class="progress-fill"></div></div>
    
    <div class="price-display">
      <span id="totalAssetsDisplay" class="total-val">¥0</span>
      <div id="totalDayDiff" class="sub-stats"></div>
      <span id="totalReturnDisplay" class="total-return-label"></span>
    </div>
  </div>

  <div class="section-header">
    <span class="section-title">ASSETS</span>
    <button id="updateBtn" class="btn-update" onclick="fetchAllPrices()"><span>↻</span> 更新</button>
  </div>
  
  <div id="stockList"></div>
</div>

<script>
const GAS_API_URL = "https://script.google.com/macros/s/AKfycbzqAE-_Q1JcW_fH-DiqMxB_QSB6WqknRlSPteVMLoztGZM7fYLHzZeNrM6xhRryQ-KW/exec";

// 🚀 銘柄名をシンプルに「PayPay」に修正
let savedData = JSON.parse(localStorage.getItem('stocks')) || [
  { name: "楽天・プラス・SOX", code: "2931123A", price: 19994, holding: 13000, cost: 25000, isStock: false },
  { name: "PayPay", code: "PAYP", price: 3950, holding: 1.86131, cost: 4749, isStock: true }
];

async function fetchAllPrices() {
  const btn = document.getElementById('updateBtn');
  btn.classList.add('loading');
  for (let s of savedData) {
    try {
      const res = await fetch(`${GAS_API_URL}?code=${s.code}`);
      const data = await res.json();
      if (data.status === "Success") { s.price = data.price; s.diff = data.diff; }
    } catch (e) { console.error(e); }
  }
  btn.classList.remove('loading');
  saveAndRender();
}

function saveAndRender() {
  localStorage.setItem('stocks', JSON.stringify(savedData));
  render();
}

function render() {
  const container = document.getElementById('stockList');
  let totalAssets = 0;
  let totalCost = 0;
  let totalDayDiffVal = 0;
  
  container.innerHTML = savedData.map((s, i) => {
    const val = s.isStock ? Math.floor(s.price * s.holding) : Math.floor((s.price * s.holding) / 10000);
    totalAssets += val;
    totalCost += s.cost;
    
    const profit = val - s.cost;
    const profitRate = s.cost ? (profit / s.cost * 100).toFixed(2) : "0.00";
    const dayDiffVal = Math.floor(val * (parseFloat(s.diff || 0) / 100));
    totalDayDiffVal += dayDiffVal;

    return `
      <div class="stock-card">
        <div class="stock-name">${s.name}</div>
        <div class="price-row">
          <span class="main-price">¥${val.toLocaleString()}</span>
          <span class="day-diff" style="color:${s.diff >= 0 ? 'var(--pos-color)' : 'var(--neg-color)'}">
            ${dayDiffVal >= 0 ? '+' : ''}${dayDiffVal.toLocaleString()} (${s.diff || 0}%)
          </span>
        </div>
        <div class="return-row">
          Total Return: <span style="color:${profit >= 0 ? 'var(--pos-color)' : 'var(--neg-color)'}">
            ${profit >= 0 ? '+' : ''}${profit.toLocaleString()} (${profitRate}%)
          </span>
        </div>
        <div class="input-grid">
          <div class="input-group">
            <span class="input-label">${s.isStock ? '現在値' : '基準価額'}</span>
            <input class="ios-input" type="number" value="${s.price}" onchange="update(${i},'price',this.value)">
          </div>
          <div class="input-group">
            <span class="input-label">数量/口数</span>
            <input class="ios-input" type="number" value="${s.holding}" onchange="update(${i},'holding',this.value)">
          </div>
          <div class="input-group">
            <span class="input-label">元本</span>
            <input class="ios-input" type="number" value="${s.cost}" onchange="update(${i},'cost',this.value)">
          </div>
        </div>
      </div>`;
  }).join('');

  // 🛠️ 上の島の数値を更新
  document.getElementById('totalAssetsDisplay').textContent = `¥${totalAssets.toLocaleString()}`;
  
  const totalProfit = totalAssets - totalCost;
  const totalProfitRate = totalCost ? (totalProfit / totalCost * 100).toFixed(2) : "0.00";
  
  // ポートフォリオ全体の前日比を表示
  const avgDiffPct = totalAssets ? ((totalDayDiffVal / totalAssets) * 100).toFixed(2) : "0.00";
  document.getElementById('totalDayDiff').innerHTML = `
    <span style="color:${totalDayDiffVal >= 0 ? 'var(--pos-color)' : 'var(--neg-color)'}">
      ${totalDayDiffVal >= 0 ? '+' : ''}${totalDayDiffVal.toLocaleString()} (${avgDiffPct}%)
    </span>`;
    
  // ポートフォリオ全体のトータルリターンを表示
  document.getElementById('totalReturnDisplay').innerHTML = `
    Total Return: <span style="color:${totalProfit >= 0 ? 'var(--pos-color)' : 'var(--neg-color)'}">
      ${totalProfit >= 0 ? '+' : ''}${totalProfit.toLocaleString()} (${totalProfitRate}%)
    </span>`;

  const prog = Math.min((totalAssets / 10000000) * 100, 100);
  document.getElementById('progressPercent').textContent = prog.toFixed(2) + "%";
  document.getElementById('progressBar').style.width = prog + "%";
}

function update(i, f, v) { savedData[i][f] = parseFloat(v) || 0; saveAndRender(); }
render();
</script>
</body>
</html>
