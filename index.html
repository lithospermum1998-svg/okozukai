<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>MONEY LOG v3.5</title>
<style>
:root {
  --bg-color: #f8f9fa; /* 少し明るいグレー */
  --card-bg: #ffffff;
  --text-main: #1a1a1e;
  --text-sub: #86868b;
  --accent: #000000; /* 黒を基調に */
  --border-color: #efeff4;
  --pos-color: #34c759;
  --neg-color: #ff3b30;
  --radius-lg: 24px;
  --radius-sm: 12px;
}

body {
  font-family: -apple-system, "SF Pro Display", "Helvetica Neue", sans-serif;
  background: var(--bg-color);
  margin: 0;
  padding: env(safe-area-inset-top) 16px 100px;
  color: var(--text-main);
  -webkit-font-smoothing: antialiased;
}

.container { max-width: 400px; margin: 0 auto; }

/* ヘッダーエリアの洗練 */
.header-box {
  padding: 32px 8px 16px;
  text-align: left;
}

.total-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-sub);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

.total-val {
  font-size: 42px;
  font-weight: 800;
  letter-spacing: -1.5px;
  margin: 8px 0;
}

/* 進捗バーのミニマル化 */
.progress-container {
  margin-bottom: 24px;
}
.progress-info {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  font-weight: 700;
  color: var(--text-sub);
  margin-bottom: 6px;
}
.progress-bar-bg {
  background: #e5e5ea;
  height: 4px;
  border-radius: 2px;
  overflow: hidden;
}
#progressBar {
  background: var(--accent);
  height: 100%;
  width: 0%;
  transition: width 0.8s cubic-bezier(0.22, 1, 0.36, 1);
}

/* 統計情報のタイル表示 */
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 24px;
}
.stat-card {
  background: var(--card-bg);
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-color);
}
.stat-label { font-size: 10px; color: var(--text-sub); font-weight: 600; margin-bottom: 4px; }
.stat-value { font-size: 14px; font-weight: 700; }

/* 銘柄カードのスリム化 */
.stock-card {
  background: var(--card-bg);
  border-radius: var(--radius-lg);
  padding: 20px;
  margin-bottom: 16px;
  border: 1px solid var(--border-color);
  transition: transform 0.2s ease;
}

.stock-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 12px;
}
.stock-name { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
.nisa-tag {
  font-size: 9px;
  font-weight: 800;
  padding: 3px 8px;
  border-radius: 20px;
  background: #f2f2f7;
  color: #8e8e93;
}

.valuation-area {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 16px;
}
.main-price { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
.diff-badge { font-size: 12px; font-weight: 700; }

/* インプットの透過デザイン */
.input-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  border-top: 1px solid var(--border-color);
  padding-top: 16px;
}
.input-group { display: flex; flex-direction: column; }
.ios-input {
  border: none;
  background: transparent;
  padding: 4px 0;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-main);
  border-bottom: 1px solid transparent;
}
.ios-input:focus {
  outline: none;
  border-bottom-color: var(--accent);
}

/* アップデートボタンのフローティング化 */
.update-wrapper {
  position: fixed;
  bottom: 30px;
  left: 0;
  right: 0;
  display: flex;
  justify-content: center;
  z-index: 100;
}
.btn-update {
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 14px 28px;
  border-radius: 40px;
  font-size: 15px;
  font-weight: 700;
  box-shadow: 0 8px 24px rgba(0,0,0,0.15);
  display: flex;
  align-items: center;
  gap: 8px;
}
.btn-update:active { transform: scale(0.95); }

@keyframes spin { 100% { transform: rotate(360deg); } }
.loading-icon { animation: spin 1s linear infinite; }
</style>
</head>
<body>

<div class="container">
  <div class="header-box">
    <div class="total-label">Total Assets</div>
    <div id="totalDisplay" class="total-val">¥0</div>
    
    <div class="progress-container">
      <div class="progress-info">
        <span id="progRate">0.00%</span>
        <span id="fxRateDisplay">USD/JPY: ---</span>
      </div>
      <div class="progress-bar-bg"><div id="progressBar"></div></div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">PREVIOUS DAY</div>
        <div id="totalDayDiff" class="stat-value">---</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">TOTAL PROFIT</div>
        <div id="totalProfitAll" class="stat-value">---</div>
      </div>
    </div>
    
    <div class="stat-card" style="margin-bottom: 32px;">
      <div class="stat-label">ESTIMATED PAYOUT (NET)</div>
      <div id="payoutDisplay" class="stat-value">¥0</div>
    </div>
  </div>

  <div id="stockList"></div>

  <div class="update-wrapper">
    <button id="updateBtn" class="btn-update" onclick="fetchAll()">
      <span id="updateIcon">↻</span> Update
    </button>
  </div>

  <div id="lastUpdated" style="text-align: center; font-size: 10px; color: var(--text-sub); margin-top: 20px;"></div>
</div>

<script>

</body>
</html>
