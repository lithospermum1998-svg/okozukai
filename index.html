<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"
/>
<meta name="theme-color" content="#000000" />
<title>MONEY LOG Compact iOS</title>

<style>
:root {
  --bg: #000000;
  --surface-1: #1c1c1e;
  --surface-2: #2c2c2e;
  --text-main: #ffffff;
  --text-sub: #8e8e93;
  --text-soft: #636366;
  --line: rgba(255,255,255,0.07);
  --accent: #0a84ff;
  --pos: #30d158;
  --neg: #ff453a;
  --shadow-soft: 0 8px 24px rgba(0,0,0,0.22);
}

* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  margin: 0;
  background: var(--bg);
  color: var(--text-main);
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
}

body {
  min-height: 100vh;
  padding: calc(8px + env(safe-area-inset-top)) 12px calc(92px + env(safe-area-inset-bottom));
  line-height: 1.18;
}

.container { max-width: 430px; margin: 0 auto; }
.numeric { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }

/* Header */
.app-header { padding: 4px 2px 10px; }
.app-title { margin: 0; font-size: 30px; font-weight: 800; letter-spacing: -0.7px; }
.app-subtitle { margin-top: 3px; color: var(--text-sub); font-size: 12px; font-weight: 600; }

/* Section Title */
.section-title { margin: 24px 2px 10px; font-size: 17px; font-weight: 800; }

/* List Common */
.list-container { display: grid; gap: 10px; }

/* Card UI */
.stock-card {
  position: relative;
  overflow: hidden;
  border-radius: 18px;
  padding: 12px;
  background: linear-gradient(180deg, rgba(255,255,255,0.032) 0%, rgba(255,255,255,0.012) 100%), var(--surface-1);
  border: 1px solid var(--line);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.03), var(--shadow-soft);
}
.stock-card::before { content: ""; position: absolute; inset: 0 auto 0 0; width: 4px; background: var(--brand, #3a3a3c); }

.card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
.card-label { font-size: 15px; font-weight: 800; margin-bottom: 3px; }
.card-sub-label { color: var(--text-sub); font-size: 10px; font-weight: 700; }

.card-main { margin-top: 9px; display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: end; }
.value-main { font-size: 24px; font-weight: 800; letter-spacing: -0.65px; }
.performance-line { font-size: 11px; font-weight: 800; line-height: 1.3; text-align: right; }

.meta-grid { margin-top: 10px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding-top: 9px; border-top: 1px solid rgba(255,255,255,0.06); }
.meta-label { color: var(--text-sub); font-size: 9px; font-weight: 700; margin-bottom: 4px; text-transform: uppercase; }
.meta-value { font-size: 12px; font-weight: 800; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* In-place Edit Input */
.inline-input {
  width: 100%;
  background: var(--surface-2);
  border: 1px solid var(--accent);
  color: var(--text-main);
  font-family: inherit;
  font-size: 12px;
  font-weight: 800;
  border-radius: 4px;
  padding: 1px 2px;
  outline: none;
}

/* Bottom Bar */
.bottom-bar { position: fixed; left: 0; right: 0; bottom: calc(12px + env(safe-area-inset-bottom)); display: flex; justify-content: center; pointer-events: none; }
.update-btn { pointer-events: auto; display: inline-flex; align-items: center; gap: 8px; height: 50px; padding: 0 20px; border-radius: 999px; background: rgba(255,255,255,0.9); color: #000; font-size: 15px; font-weight: 800; border: none; backdrop-filter: blur(20px); box-shadow: 0 10px 24px rgba(0,0,0,0.3); }

.pos { color: var(--pos); }
.neg { color: var(--neg); }
</style>
</head>

<body>
  <div class="container">
    <header class="app-header">
      <h1 class="app-title">資産</h1>
      <div class="app-subtitle">MONEY LOG</div>
    </header>

    <div class="section-title">Summary</div>
    <div id="summaryCards" class="list-container"></div>

    <div class="section-title">Portfolio</div>
    <div id="stockList" class="list-container"></div>
  </div>

  <div class="bottom-bar">
    <button id="updateBtn" class="update-btn" onclick="fetchAll()">
      <span id="updateIcon">↻</span> <span>update</span>
    </button>
  </div>

<script>
const GAS_API_URL = "https://script.google.com/macros/s/AKfycby2CVXP9e34KWPbe8tFqhjvnznaq03Z8R-EoWLZeafce3PY_aet8nzEd0MlTj77YZM9/exec";
const STORAGE_KEY = "money_log_compact_ios";

const INITIAL_DATA = [
  { name: "楽天・プラス・SOX", code: "2931123A", price: 19391, holding: 59845, cost: 121180, isStock: false, isNisa: true, diff: null },
  { name: "NASDAQ100ゴールドプラス", code: "02311251", price: 18700, holding: 0, cost: 3000, isStock: false, isNisa: false, diff: null },
  { name: "PayPay", code: "PAYP", price: 23.04, holding: 1.86131, cost: 4749, isStock: true, isNisa: false, rate: null, diff: null }
];

const BRAND_COLORS = { "2931123A": "#8b0000", "02311251": "#d4af37", "PAYP": "#ff3b30" };

let data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || INITIAL_DATA;
let data = INITIAL_DATA;
let currentUsdJpy = parseFloat(localStorage.getItem(STORAGE_KEY + "_usd")) || null;
let editingCell = { index: null, field: null };

function formatYen(v) { return "¥" + Math.floor(v).toLocaleString(); }
function formatSigned(v) { return (v >= 0 ? "+" : "") + Math.floor(v).toLocaleString(); }
function formatPct(v) { return (v >= 0 ? "+" : "") + v.toFixed(2) + "%"; }

function calcValuation(item) {
  if (item.isStock) {
    const rate = item.rate ?? currentUsdJpy;
    return rate ? Math.floor(item.price * rate * item.holding) : null;
  }
  return Math.floor(item.price * item.holding / 10000);
}

function startEdit(index, field) {
  editingCell = { index, field };
  render();
  const input = document.getElementById(`input-${index}-${field}`);
  if (input) { input.focus(); input.select(); }
}

function finishEdit(index, field, value) {
  const num = parseFloat(value);
  if (!isNaN(num)) data[index][field] = num;
  editingCell = { index: null, field: null };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  render();
}

async function fetchAll() {
  const icon = document.getElementById("updateIcon");
  icon.animate([{ transform: 'rotate(0deg)' }, { transform: 'rotate(360deg)' }], { duration: 1000, iterations: Infinity });
  
  await Promise.all(data.map(async (item) => {
    try {
      const res = await fetch(`${GAS_API_URL}?code=${item.code}`);
      const json = await res.json();
      if (json.status === "Success") {
        item.price = json.price;
        item.diff = json.diff ?? null;
        if (json.rate) {
          currentUsdJpy = json.rate;
          localStorage.setItem(STORAGE_KEY + "_usd", String(json.rate));
        }
      }
    } catch (e) {}
  }));
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  render();
  icon.getAnimations().forEach(a => a.cancel());
}

function render() {
  const list = document.getElementById("stockList");
  const summary = document.getElementById("summaryCards");
  let totalValue = 0, totalCost = 0, dayDiffSum = 0, taxableProfit = 0;

  data.forEach(item => {
    const val = calcValuation(item) || 0;
    totalValue += val;
    totalCost += item.cost;
    if (item.diff !== null) dayDiffSum += Math.floor(val * (parseFloat(item.diff) / 100));
    if (!item.isNisa) taxableProfit += (val - item.cost);
  });

  const overallProfit = totalValue - totalCost;
  const overallProfitRate = totalCost > 0 ? (overallProfit / totalCost * 100) : 0;
  const estTax = taxableProfit > 0 ? Math.floor(taxableProfit * 0.20315) : 0;
  const netValue = totalValue - estTax;

  // Summary Card (Integrated)
  summary.innerHTML = `
    <section class="stock-card" style="--brand:#ffffff">
      <div class="card-top">
        <div><div class="card-label">Total Assets</div><div class="card-sub-label">SUMMARY</div></div>
      </div>
      <div class="card-main">
        <div class="value-main numeric">${formatYen(totalValue)}</div>
        <div class="performance-wrap">
          <div class="performance-line numeric ${dayDiffSum >= 0 ? "pos" : "neg"}">Prev: ${formatSigned(dayDiffSum)}</div>
          <div class="performance-line numeric ${overallProfit >= 0 ? "pos" : "neg"}">Total: ${formatPct(overallProfitRate)}</div>
        </div>
      </div>
      <div class="meta-grid">
        <div style="grid-column: span 2;">
          <div class="meta-label">Net Estimation</div>
          <div class="meta-value numeric">${formatYen(netValue)}</div>
        </div>
        <div>
          <div class="meta-label">Tax</div>
          <div class="meta-value numeric" style="color:var(--text-soft)">${formatYen(estTax)}</div>
        </div>
        <div>
          <div class="meta-label">Profit</div>
          <div class="meta-value numeric ${overallProfit >= 0 ? 'pos' : 'neg'}">${formatSigned(overallProfit)}</div>
        </div>
      </div>
    </section>
  `;

  // Portfolio Cards
  list.innerHTML = data.map((item, index) => {
    const val = calcValuation(item) || 0;
    const profit = val - item.cost;
    const profitRate = item.cost > 0 ? (profit / item.cost * 100) : 0;
    const hasDiff = item.diff !== null;
    const dayDiffValue = hasDiff ? Math.floor(val * (parseFloat(item.diff) / 100)) : 0;
    const brand = BRAND_COLORS[item.code] || "#3a3a3c";
    
    const renderInline = (field, val, display) => {
      if (editingCell.index === index && editingCell.field === field) {
        return `<input id="input-${index}-${field}" class="inline-input" type="number" step="any" value="${val}" onblur="finishEdit(${index}, '${field}', this.value)" onkeydown="if(event.key==='Enter') this.blur()">`;
      }
      return `<div onclick="startEdit(${index}, '${field}')">${display}</div>`;
    };

    return `
      <section class="stock-card" style="--brand:${brand}">
        <div class="card-top">
          <div style="min-width:0; flex:1;">
            <div class="card-label" style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${item.name}</div>
            <div class="card-sub-label numeric">${item.code}</div>
          </div>
          <div class="account-badge">${item.isNisa ? "NISA" : "特定"}</div>
        </div>
        <div class="card-main">
          <div class="value-main numeric">${formatYen(val)}</div>
          <div class="performance-wrap">
            <div class="performance-line numeric ${dayDiffValue >= 0 ? "pos" : "neg"}">
              Prev: ${hasDiff ? formatSigned(dayDiffValue) : "---"}
            </div>
            <div class="performance-line numeric ${profit >= 0 ? "pos" : "neg"}">
              Total: ${formatPct(profitRate)}
            </div>
          </div>
        </div>
        <div class="meta-grid">
          <div><div class="meta-label">Price</div><div class="meta-value numeric">${item.price.toLocaleString()}</div></div>
          <div><div class="meta-label">Qty</div><div class="meta-value numeric">${renderInline('holding', item.holding, item.holding.toLocaleString())}</div></div>
          <div><div class="meta-label">Cost</div><div class="meta-value numeric">${renderInline('cost', item.cost, formatYen(item.cost))}</div></div>
          <div><div class="meta-label">FX</div><div class="meta-value numeric">${item.isStock && currentUsdJpy ? '¥'+currentUsdJpy.toFixed(1) : '-'}</div></div>
        </div>
      </section>
    `;
  }).join("");
}

render();
</script>
</body>
</html>
