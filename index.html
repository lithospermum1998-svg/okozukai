<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#000000" />
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>𝄃</title>
<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

html, body {
  height: 100%;
  color: #ffffff;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
  background: #000000;
  overflow: hidden;
  user-select: none; -webkit-user-select: none;
}

body {
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: calc(80px + env(safe-area-inset-top)) 32px calc(40px + env(safe-area-inset-bottom));
}

/* ── 隠蔽された極薄のタイトル ── */
.minimal-title {
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.35em;
  color: rgba(255, 255, 255, 0.06);
  text-transform: uppercase;
  text-align: center;
  position: absolute;
  top: calc(25px + env(safe-area-inset-top));
  left: 0;
  right: 0;
  pointer-events: none;
}

/* ── Asset Hero (タップすると同期する巨大な数字) ── */
.center-piece {
  margin-top: auto;
  margin-bottom: auto;
  cursor: pointer;
}

.main-value {
  font-size: 64px;
  font-weight: 100;
  letter-spacing: -3px;
  line-height: 1.0;
  font-variant-numeric: tabular-nums;
  transition: opacity 0.5s ease;
}
.center-piece:active .main-value { opacity: 0.2; }

/* 同期中の静かな明滅 */
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
.syncing .main-value { animation: pulse 1.5s infinite ease-in-out; pointer-events: none; }

.sub-metrics {
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.05em;
  color: #555555;
  margin-top: 16px;
  font-variant-numeric: tabular-nums;
  transition: color 0.3s;
}
.history-mode .sub-metrics { color: #ffffff; }

/* ── 1px Line Chart (ただ横たわる軌跡) ── */
.chart-space {
  width: 100%;
  height: 120px;
  margin-bottom: 60px;
  position: relative;
}

svg.minimal-svg {
  width: 100%;
  height: 100%;
  overflow: visible;
}

/* ── 隠蔽された設定コントロールレイヤー ── */
.meta-trigger {
  font-size: 10px;
  letter-spacing: 0.2em;
  color: #222222;
  text-align: center;
  cursor: pointer;
  text-transform: uppercase;
  transition: color 0.2s;
  padding: 10px;
}
.meta-trigger:active { color: #ffffff; }

.control-panel {
  position: fixed;
  top: 0; left: 0; width: 100vw; height: 100vh;
  background: #000000;
  z-index: 100;
  padding: calc(40px + env(safe-area-inset-top)) 32px;
  display: flex;
  flex-direction: column;
  gap: 32px;
  transform: translateY(100%);
  transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}
.control-panel.open { transform: translateY(0); }

.panel-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}
.panel-title { font-size: 11px; font-weight: 700; letter-spacing: 0.2em; color: #555555; text-transform: uppercase; }
.close-btn { font-size: 11px; color: #ffffff; cursor: pointer; text-decoration: underline; }

.input-group {
  display: flex;
  flex-direction: column;
  gap: 8px;
  border-bottom: 1px solid #111111;
  padding-bottom: 16px;
}
.input-label { font-size: 9px; color: #555555; letter-spacing: 0.1em; text-transform: uppercase; }
.clean-input {
  background: transparent; border: none; color: #ffffff;
  font-size: 18px; font-family: inherit; font-weight: 300; outline: none;
}

.action-row { display: flex; gap: 24px; margin-top: auto; padding-bottom: calc(20px + env(safe-area-inset-bottom)); }
.action-link { font-size: 11px; color: #555555; cursor: pointer; text-decoration: underline; }
.action-link:active { color: #ffffff; }
</style>
</head>
<body>

<div class="minimal-title">Money Log ── SOX Portfolio</div>

<div class="center-piece" id="syncTrigger" onclick="fetchAll()">
  <div class="main-value" id="mainValDisplay">0</div>
  <div class="sub-metrics" id="subMetricsDisplay">---</div>
</div>

<div class="chart-space" id="chartSpace"></div>

<div class="meta-trigger" onclick="togglePanel(true)">data</div>

<div class="control-panel" id="controlPanel">
  <div class="panel-header">
    <span class="panel-title">Ledger Configuration</span>
    <span class="close-btn" onclick="togglePanel(false)">Dismiss</span>
  </div>

  <div class="input-group">
    <span class="input-label">Total Holdings (口数)</span>
    <input type="number" id="inputHolding" class="clean-input" onblur="updateConfig('holding', this.value)">
  </div>

  <div class="input-group">
    <span class="input-label">Principal Cost (取得コスト)</span>
    <input type="number" id="inputCost" class="clean-input" onblur="updateConfig('cost', this.value)">
  </div>

  <div class="input-group">
    <span class="input-label">Fund Ident Code</span>
    <input type="text" id="inputCode" class="clean-input" onblur="updateConfig('code', this.value)">
  </div>

  <div class="action-row">
    <span class="action-link" onclick="exportData()">Export Token</span>
    <span class="action-link" onclick="importData()">Import Token</span>
  </div>
</div>

<script>
const GAS_API_URL = "https://script.google.com/macros/s/AKfycby2CVXP9e34KWPbe8tFqhjvnznaq03Z8R-EoWLZeafce3PY_aet8nzEd0MlTj77YZM9/exec";
const SK = "money_log_sox_v2";

// ── Minimal States ──
const DEFAULT = { name: "楽天・プラス・SOX", code: "2931123A", price: 19391, holding: 59845, cost: 121180, diff: null };
let stock = (() => { try { const s = localStorage.getItem(SK); return s ? { ...DEFAULT, ...JSON.parse(s) } : { ...DEFAULT }; } catch { return { ...DEFAULT }; } })();
let history = (() => { try { const h = localStorage.getItem(SK + "_hist"); return h ? JSON.parse(h) : []; } catch { return []; } })();
let isUpdating = false;

function save() { localStorage.setItem(SK, JSON.stringify(stock)); }
function saveHistory() { localStorage.setItem(SK + "_hist", JSON.stringify(history)); }

const getValuation = (p = stock.price) => p * stock.holding / 10000;
const getPnL = (v) => v - stock.cost;

// ★改修：¥マークを取り除き、純粋なカンマ区切り数値のみを返すよう変更
const fmtYen = v => v === null || !isFinite(v) ? "---" : Math.round(v).toLocaleString();
const fmtSign = v => { const r = Math.round(v); return (r >= 0 ? "+" : "") + r.toLocaleString(); };
const fmtPct = v => (v >= 0 ? "+" : "") + v.toFixed(2) + "%";

// ── Chart Engine ──
let chartPoints = [];
function drawMinimalChart() {
  const space = document.getElementById("chartSpace");
  if (history.length < 2) { space.innerHTML = ""; return; }

  const sorted = [...history].sort((a,b) => a.date.localeCompare(b.date));
  const vals = sorted.map(d => d.pnl);
  const minV = Math.min(...vals); const maxV = Math.max(...vals); const range = maxV - minV || 1;
  
  const W = 500, H = 120;
  chartPoints = sorted.map((d, i) => ({
    x: (i / (sorted.length - 1)) * W,
    y: 4 + (1 - (d.pnl - minV) / range) * (H - 8),
    date: d.date,
    pnl: d.pnl
  }));

  const pathD = chartPoints.map((p, i) => (i === 0 ? `M${p.x},${p.y}` : `L${p.x},${p.y}`)).join(" ");

  space.innerHTML = `
    <svg class="minimal-svg" id="minimalSvg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      <path d="${pathD}" fill="none" stroke="#ffffff" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
      <line id="hairline" x1="0" y1="0" x2="0" y2="${H}" stroke="#222222" stroke-width="1" style="display:none;" />
    </svg>
  `;
  
  initChartInteractions();
}

function initChartInteractions() {
  const space = document.getElementById("chartSpace");
  const hl = document.getElementById("hairline");
  if (!hl || chartPoints.length === 0) return;

  const handlePointer = (clientX) => {
    const rect = space.getBoundingClientRect();
    const pct = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    const targetX = pct * 500;

    let closest = chartPoints[0]; let minDiff = Math.abs(chartPoints[0].x - targetX);
    for (let p of chartPoints) { const diff = Math.abs(p.x - targetX); if (diff < minDiff) { minDiff = diff; closest = p; } }

    hl.setAttribute("x1", closest.x); hl.setAttribute("x2", closest.x);
    hl.style.display = "block";

    document.body.classList.add("history-mode");
    const simulatedVal = stock.cost + closest.pnl;
    const rate = stock.cost > 0 ? (closest.pnl / stock.cost * 100) : 0;
    
    document.getElementById("mainValDisplay").textContent = fmtYen(simulatedVal);
    document.getElementById("subMetricsDisplay").textContent = `${closest.date} ── TOTAL: ${fmtSign(closest.pnl)} (${fmtPct(rate)})`;
  };

  const resetPointer = () => { hl.style.display = "none"; document.body.classList.remove("history-mode"); renderLive(); };

  space.addEventListener("mousemove", (e) => handlePointer(e.clientX));
  space.addEventListener("mouseleave", resetPointer);
  space.addEventListener("touchstart", (e) => handlePointer(e.touches[0].clientX), {passive:true});
  space.addEventListener("touchmove", (e) => handlePointer(e.touches[0].clientX), {passive:true});
  space.addEventListener("touchend", resetPointer);
}

function renderLive() {
  const val = getValuation();
  const pnl = getPnL(val);
  const rate = stock.cost > 0 ? (pnl / stock.cost * 100) : 0;
  const dayDiff = stock.diff !== null ? val * (parseFloat(stock.diff) / 100) : null;

  document.getElementById("mainValDisplay").textContent = fmtYen(val);
  
  let metricsStr = "";
  if (dayDiff !== null) metricsStr += `DAY: ${fmtSign(dayDiff)} (${fmtPct(parseFloat(stock.diff))})`;
  metricsStr += `   /   TOTAL: ${fmtSign(pnl)} (${fmtPct(rate)})`;
  
  document.getElementById("subMetricsDisplay").textContent = metricsStr;
}

function render() {
  renderLive();
  drawMinimalChart();
  
  document.getElementById("inputHolding").value = stock.holding;
  document.getElementById("inputCost").value = stock.cost;
  document.getElementById("inputCode").value = stock.code;
}

function togglePanel(open) { document.getElementById("controlPanel").classList.toggle("open", open); }
function updateConfig(field, value) {
  if (field === 'code') { stock.code = value; } 
  else { const n = parseFloat(value); if (!isNaN(n) && isFinite(n)) stock[field] = n; }
  save(); render();
}

function exportData() {
  const b = { stock: localStorage.getItem(SK), hist: localStorage.getItem(SK + "_hist") };
  navigator.clipboard.writeText(JSON.stringify(b)).then(() => alert("Copied token."));
}
function importData() {
  const str = prompt("Paste token:"); if (!str) return;
  try {
    const b = JSON.parse(str);
    if (b.stock) localStorage.setItem(SK, b.stock); if (b.hist) localStorage.setItem(SK + "_hist");
    location.reload();
  } catch { alert("Error"); }
}

async function fetchAll() {
  if (isUpdating) return; isUpdating = true;
  const container = document.getElementById("syncTrigger");
  container.classList.add("syncing");

  try {
    const res = await fetch(`${GAS_API_URL}?code=${encodeURIComponent(stock.code)}`, { cache: "no-store" });
    const json = await res.json();
    if (json.status === "Success") {
      stock.price = json.price; stock.diff = json.diff ?? null; save();
      
      const today = new Date().toISOString().slice(0, 10);
      const pnl = Math.round(getPnL(getValuation()));
      const idx = history.findIndex(h => h.date === today);
      if (idx >= 0) history[idx].pnl = pnl; else history.push({ date: today, pnl });
      if (history.length > 180) history = history.slice(-180);
      saveHistory();

      render();
    }
  } catch (e) {}

  container.classList.remove("syncing");
  isUpdating = false;
}

render();
</script>
</body>
</html>
