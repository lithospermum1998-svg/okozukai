<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"
/>
<meta name="theme-color" content="#000000" />
<title>MONEY LOG v3.3 Compact Direct</title>

<style>
:root {
  --bg: #000000;
  --surface-1: #1c1c1e;
  --surface-2: #2c2c2e;
  --surface-3: #3a3a3c;
  --text-main: #ffffff;
  --text-sub: #8e8e93;
  --line: rgba(255,255,255,0.07);
  --accent: #0a84ff;
  --pos: #30d158;
  --neg: #ff453a;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; background: var(--bg); color: var(--text-main); font-family: -apple-system, sans-serif; }

body {
  padding: calc(15px + env(safe-area-inset-top)) 12px calc(90px + env(safe-area-inset-bottom));
  line-height: 1.2;
}

.container { max-width: 430px; margin: 0 auto; }
.numeric { font-variant-numeric: tabular-nums; }

/* Header */
.app-header { padding: 4px 4px 14px; }
.app-title {
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -0.3px;
  text-transform: uppercase;
}

/* Summary Card */
.summary-card {
  background: linear-gradient(180deg, rgba(255,255,255,0.04) 0%, var(--surface-1) 100%);
  border: 1px solid var(--line);
  border-radius: 24px;
  padding: 18px;
  margin-bottom: 12px;
}

.summary-label { font-size: 10px; color: var(--text-sub); font-weight: 700; text-transform: uppercase; margin-bottom: 5px; }
.main-display-row { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 14px; }
.total-display { font-size: 28px; font-weight: 800; letter-spacing: -0.8px; }
.summary-performance { text-align: right; font-size: 11px; font-weight: 800; line-height: 1.4; }

/* NET Style - 1行・右揃え・上線 */
.net-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 2px 0;
  border-top: 1px solid rgba(255,255,255,0.06);
}
.net-label { font-size: 12px; color: var(--text-sub); font-weight: 700; }
.net-value-wrap { text-align: right; }
.net-value { font-size: 14px; font-weight: 800; }
.net-tax { font-size: 10px; color: var(--neg); font-weight: 700; margin-left: 6px; }

/* Portfolio Section */
.section-title { margin: 12px 4px 8px; font-size: 17px; font-weight: 800; color: var(--text-sub); }

.stock-card {
  position: relative;
  border-radius: 18px;
  padding: 12px 14px;
  background: var(--surface-1);
  border: 1px solid var(--line);
  margin-bottom: 10px;
}

.stock-card::before {
  content: ""; position: absolute; left: 0; top: 12px; bottom: 12px;
  width: 4px; border-radius: 0 2px 2px 0; background: var(--brand, #3a3a3c);
}

.stock-header { display: flex; justify-content: space-between; margin-bottom: 6px; }
.stock-name { font-size: 14px; font-weight: 700; }
.account-badge { font-size: 9px; font-weight: 800; color: var(--text-sub); background: rgba(255,255,255,0.06); padding: 2px 6px; border-radius: 4px; }

.stock-main { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.stock-value { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
.stock-performance { text-align: right; font-size: 11px; font-weight: 700; line-height: 1.4; }

.view-meta { border-top: 1px solid rgba(255,255,255,0.05); padding-top: 6px; display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
.meta-row { display: flex; flex-direction: column; justify-content: center; padding: 4px 0; }
.meta-label { font-size: 9px; color: var(--text-sub); font-weight: 700; text-transform: uppercase; margin-bottom: 2px; }

.ios-direct-input {
  background: transparent; border: none; color: var(--text-main); font-family: inherit;
  font-size: 13px; font-weight: 700; text-align: left;
  width: 100%; padding: 2px 0; outline: none; border-radius: 4px;
}
.ios-direct-input:focus { background: var(--surface-3); padding-left: 4px; }

/* Bottom Bar */
.bottom-bar { position: fixed; left: 0; right: 0; bottom: 20px; display: flex; justify-content: center; pointer-events: none; }
.update-btn {
  pointer-events: auto; height: 44px; padding: 0 20px; border-radius: 99px;
  background: #fff; color: #000; font-size: 14px; font-weight: 800; border: none; box-shadow: 0 8px 20px rgba(0,0,0,0.4);
}

.pos { color: var(--pos); }
.neg { color: var(--neg); }
@keyframes spin { to { transform: rotate(360deg); } }
.loading { animation: spin 1s linear infinite; display: inline-block; }
</style>
</head>

<body>
  <div class="container">
    <header class="app-header">
      <div class="app-title">MONEY LOG</div>
    </header>

    <section class="summary-card">
      <div class="summary-label">Total Assets</div>
      <div class="main-display-row">
        <div class="total-display numeric" id="totalDisplay">¥0</div>
        <div class="summary-performance">
          <div id="totalDayDiff" class="numeric pos">---</div>
          <div id="totalProfitAll" class="numeric pos" style="margin-top: 4px;">---</div>
        </div>
      </div>
      
      <div class="net-row">
        <div class="net-label">NET (EST.)</div>
        <div class="net-value-wrap">
          <span class="net-value numeric" id="payoutDisplay">¥0</span>
          <span id="taxNote" class="net-tax numeric">Tax: ¥0</span>
        </div>
      </div>
    </section>

    <div class="section-title">Portfolio</div>
    <div id="stockList"></div>
  </div>

  <div class="bottom-bar">
    <button class="update-btn" onclick="fetchAll()"><span id="updateIcon">↻</span> update</button>
  </div>

<script>
const GAS_API_URL = "https://script.google.com/macros/s/AKfycbyNWxHLVUfBd2_sYdZ-0AuoZkBElRCyNrJN36B08y8QO3wUqy7IVAb_WjqO4umUvb7a/exec";
const STORAGE_KEY = "money_log_v3_ios_edit";

let data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [
  { name: "楽天・プラス・SOX", code: "2931123A", price: 19391, holding: 59845, cost: 121180, isStock: false, isNisa: true, diff: null },
  { name: "NASDAQ100ゴールドプラス", code: "02311251", price: 18700, holding: 0, cost: 3000, isStock: false, isNisa: true, diff: null },
  { name: "PayPay", code: "PAYP", price: 23.04, holding: 1.86131, cost: 4749, isStock: true, isNisa: false, rate: null, diff: null }
];

let currentUsdJpy = parseFloat(localStorage.getItem(STORAGE_KEY + "_usd")) || 150.00;

function formatYen(v) { return "¥" + Math.floor(v).toLocaleString(); }
function formatSigned(v) { return (v > 0 ? "+" : "") + Math.floor(v).toLocaleString(); }

function updateItem(index, field, value) {
  data[index][field] = parseFloat(value) || 0;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  render();
}

async function fetchAll() {
  const icon = document.getElementById("updateIcon");
  icon.classList.add("loading");
  await Promise.all(data.map(async (item) => {
    try {
      const res = await fetch(`${GAS_API_URL}?code=${item.code}`);
      const json = await res.json();
      if (json.status === "Success") {
        item.price = json.price;
        item.diff = json.diff ?? null;
        if (json.rate) { currentUsdJpy = json.rate; localStorage.setItem(STORAGE_KEY + "_usd", currentUsdJpy); }
      }
    } catch (e) { console.error(e); }
  }));
  icon.classList.remove("loading");
  render();
}

function render() {
  const list = document.getElementById("stockList");
  let totalValue = 0, totalCost = 0, dayDiffSum = 0, taxableProfit = 0;
  const BRAND_COLORS = { "2931123A": "#8b0000", "02311251": "#d4af37", "PAYP": "#ff3b30" };

  list.innerHTML = data.map((item, index) => {
    const valuation = item.isStock ? (item.price * (item.rate ?? currentUsdJpy) * item.holding) : (item.price * item.holding / 10000);
    totalValue += valuation; totalCost += item.cost;
    const hasDiff = item.diff !== null;
    const dayDiffValue = hasDiff ? Math.floor(valuation * (item.diff / 100)) : 0;
    if (hasDiff) dayDiffSum += dayDiffValue;
    const profit = valuation - item.cost;
    const profitRate = item.cost > 0 ? (profit / item.cost * 100) : 0;
    if (!item.isNisa) taxableProfit += profit;

    return `
      <section class="stock-card" style="--brand:${BRAND_COLORS[item.code] || '#3a3a3c'}">
        <div class="stock-header">
          <div class="stock-name">${item.name}</div>
          <div class="account-badge">${item.isNisa ? "NISA" : "特定"}</div>
        </div>
        <div class="stock-main">
          <div class="stock-value numeric">${formatYen(valuation)}</div>
          <div class="stock-performance">
            <div class="${dayDiffValue >= 0 ? 'pos' : 'neg'}">Prev: ${hasDiff ? formatSigned(dayDiffValue) : '---'}</div>
            <div class="${profit >= 0 ? 'pos' : 'neg'}">Total: ${formatSigned(profit)} (${profitRate.toFixed(1)}%)</div>
          </div>
        </div>
        <div class="view-meta">
          <div class="meta-row">
            <div class="meta-label">${item.isStock ? 'Price($)' : 'NAV'}</div>
            <input class="ios-direct-input numeric" type="number" step="any" inputmode="decimal" value="${item.price}" onchange="updateItem(${index}, 'price', this.value)">
          </div>
          <div class="meta-row">
            <div class="meta-label">Qty / Cost(¥)</div>
            <div style="display:flex; gap:8px;">
              <input class="ios-direct-input numeric" style="width:45%;" type="number" step="any" inputmode="decimal" value="${item.holding}" onchange="updateItem(${index}, 'holding', this.value)">
              <input class="ios-direct-input numeric" style="width:45%;" type="number" step="any" inputmode="decimal" value="${item.cost}" onchange="updateItem(${index}, 'cost', this.value)">
            </div>
          </div>
        </div>
      </section>`;
  }).join("");

  document.getElementById("totalDisplay").textContent = formatYen(totalValue);
  const dayRate = (totalValue - dayDiffSum) > 0 ? (dayDiffSum / (totalValue - dayDiffSum) * 100) : 0;
  document.getElementById("totalDayDiff").textContent = `Prev: ${formatSigned(dayDiffSum)} (${dayRate.toFixed(2)}%)`;
  document.getElementById("totalDayDiff").className = (dayDiffSum >= 0 ? "pos" : "neg");
  
  const overallProfit = totalValue - totalCost;
  const overallProfitRate = totalCost > 0 ? (overallProfit / totalCost * 100) : 0;
  document.getElementById("totalProfitAll").textContent = `Total: ${formatSigned(overallProfit)} (${overallProfitRate.toFixed(2)}%)`;
  document.getElementById("totalProfitAll").className = (overallProfit >= 0 ? "pos" : "neg");

  const estTax = taxableProfit > 0 ? Math.floor(taxableProfit * 0.20315) : 0;
  document.getElementById("payoutDisplay").textContent = formatYen(totalValue - estTax);
  document.getElementById("taxNote").textContent = estTax > 0 ? `Tax: ${formatSigned(estTax * -1)}` : `Tax: ¥0`;
}
render();
</script>
</body>
</html>
