<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>MONEY LOG v3.2 + Floating Update</title>

<style>
:root {
  --bg-color: #f2f2f7; 
  --card-bg: #ffffff; 
  --text-main: #1c1c1e; 
  --text-sub: #8e8e93; 
  --radius: 16px; 
  --input-bg: #f9f9fb; 
  --input-border: #e5e5ea;
  --accent: #000; 
  --pos-color: #34c759; 
  --neg-color: #ff3b30; 
}

body { 
  font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
  background: var(--bg-color); 
  margin: 0; 
  padding: 12px; 
  color: var(--text-main); 
  line-height: 1.2; 
  padding-bottom: 100px;
}

.container { 
  max-width: 420px; 
  margin: 0 auto; 
  padding-top: 10px;
}

/* ===== Progress ===== */
.progress-box {
  background: var(--card-bg);
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 20px;
  text-align: center;
  border-left: 5px solid var(--text-main);
}

.progress-bar-container { 
  background: #e5e5ea; 
  height: 6px; 
  border-radius: 3px; 
  margin: 12px 0; 
  overflow: hidden; 
}

#progressBar { 
  background: #000; 
  height: 100%; 
  width: 0%; 
  transition: width 0.5s ease-out; 
}

.total-val { 
  font-size: 42px; 
  font-weight: 900; 
  letter-spacing: -1.5px; 
  font-variant-numeric: tabular-nums;
}

.summary-stats { 
  display: flex; 
  justify-content: center; 
  gap: 15px; 
  font-size: 11px; 
  opacity: 0.6; 
}

.payout-box {
  margin-top: 12px;
  border: 1px solid #e5e5ea;
  border-radius: 12px;
  padding: 10px;
}

/* ===== Cards ===== */
.stock-card { 
  background: var(--card-bg); 
  border-radius: var(--radius); 
  padding: 16px; 
  margin-bottom: 16px; 
  border: 1px solid #e5e5ea;
}

.nisa-tag { 
  font-size: 10px; 
  font-weight: bold; 
  padding: 2px 8px; 
  border-radius: 6px; 
  background: #e5e5ea; 
}

.stock-name { 
  font-weight: 700; 
  letter-spacing: 0.2px;
}

.main-price { 
  font-size: 24px; 
  font-weight: 800; 
}

/* ===== Inputs ===== */
.input-grid { 
  display: grid; 
  grid-template-columns: 1fr 1fr 1.1fr; 
  gap: 8px; 
  margin-top: 12px; 
}

.input-label { 
  font-size: 10px; 
  color: var(--text-sub); 
  font-weight: 600; 
}

.ios-input { 
  width: 100%; 
  padding: 8px; 
  border: 1px solid var(--input-border); 
  border-radius: 10px; 
  background: var(--input-bg); 
  font-weight: 600; 
}

/* ===== Floating Button ===== */
.btn-fixed-wrap { 
  position: fixed; 
  bottom: 30px; 
  left: 0; 
  right: 0; 
  display: flex; 
  justify-content: center; 
  pointer-events: none; 
  z-index: 100;
}

.btn-update {
  pointer-events: auto;
  background: rgba(0, 0, 0, 0.75);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 999px;
  padding: 14px 28px;
  color: #fff;
  font-size: 15px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 8px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.15);
  transition: all 0.2s ease;
}

.btn-update:active {
  transform: scale(0.96);
  backdrop-filter: blur(6px);
}

.btn-update:disabled {
  opacity: 0.5;
}

.loading-icon {
  animation: spin 1s linear infinite;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

.last-updated { 
  font-size: 10px; 
  color: var(--text-sub); 
  text-align: center; 
  margin-top: 10px; 
}

.error-banner { 
  background: #fff0f0; 
  color: var(--neg-color); 
  font-size: 12px; 
  font-weight: 700; 
  padding: 8px; 
  border-radius: 10px; 
  margin-bottom: 10px; 
  display: none; 
}
</style>
</head>

<body>

<div class="container">
  <div id="errorBanner" class="error-banner"></div>

  <div class="progress-box">
    <div style="display:flex; justify-content:space-between; font-size:10px;">
      <div>Project 10M <span id="progRate">(0%)</span></div>
      <div id="fxRateDisplay">USD/JPY: ---</div>
    </div>

    <div class="progress-bar-container">
      <div id="progressBar"></div>
    </div>

    <div>Total Assets</div>
    <div id="totalDisplay" class="total-val">¥0</div>

    <div class="summary-stats">
      <span id="totalDayDiff">--</span>
      <span id="totalProfitAll">--</span>
    </div>

    <div class="payout-box">
      <div id="payoutDisplay">¥0</div>
    </div>
  </div>

  <div id="stockList"></div>
  <div id="lastUpdated" class="last-updated"></div>
</div>

<!-- ===== Floating Button ===== -->
<div class="btn-fixed-wrap">
  <button id="updateBtn" class="btn-update" onclick="fetchAll()">
    <span id="updateIcon">↻</span>
    update
  </button>
</div>

<script>
// （JSはそのまま）
const GAS_API_URL = "https://script.google.com/macros/s/AKfycbyBwS13vfLF_Ndut84W1Sjujp538VOoSNa_18dtxJOqT4y6ubnpOEVm6aUTLzksI6sl/exec";
const STORAGE_KEY = "money_log_v3.2";

const INITIAL_DATA = [
  { name: "楽天・プラス・SOX", code: "2931123A", price: 19391, holding: 59845, cost: 121180, isStock: false, isNisa: true },
  { name: "PayPay", code: "PAYP", price: 23.04, holding: 1.86131, cost: 4749, isStock: true, isNisa: false }
];

let data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || INITIAL_DATA;

function fetchAll(){
  const btn = document.getElementById('updateBtn');
  const icon = document.getElementById('updateIcon');
  btn.disabled = true;
  icon.classList.add('loading-icon');

  setTimeout(()=>{
    icon.classList.remove('loading-icon');
    btn.disabled = false;
    document.getElementById('lastUpdated').textContent = "更新完了";
  },1000);
}
</script>

</body>
</html>
