<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"
/>
<meta name="theme-color" content="#000000" />
<title>MONEY LOG Compact iOS</title>

<style>
:root {
  --bg: #000000;
  --surface-1: #1c1c1e;
  --surface-2: #2c2c2e;
  --text-main: #ffffff;
  --text-sub: #8e8e93;
  --text-soft: #636366;
  --line: rgba(255,255,255,0.07);
  --accent: #0a84ff;
  --pos: #30d158;
  --neg: #ff453a;
  --shadow-soft: 0 8px 24px rgba(0,0,0,0.22);
}

* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  margin: 0;
  background: var(--bg);
  color: var(--text-main);
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
}

body {
  min-height: 100vh;
  padding: calc(8px + env(safe-area-inset-top)) 12px calc(92px + env(safe-area-inset-bottom));
  line-height: 1.18;
}

.container { max-width: 430px; margin: 0 auto; }
.numeric { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }

/* Header */
.app-header { padding: 4px 2px 10px; }
.app-title { margin: 0; font-size: 30px; font-weight: 800; letter-spacing: -0.7px; }
.app-subtitle { margin-top: 3px; color: var(--text-sub); font-size: 12px; font-weight: 600; }

/* Summary Card */
.summary-card {
  background: linear-gradient(180deg, rgba(255,255,255,0.038) 0%, rgba(255,255,255,0.014) 100%), var(--surface-1);
  border: 1px solid var(--line);
  border-radius: 22px;
  padding: 14px;
  box-shadow: var(--shadow-soft);
  margin-bottom: 12px;
}

.summary-top { display: flex; justify-content: space-between; margin-bottom: 10px; }
.summary-kicker { color: var(--text-sub); font-size: 11px; font-weight: 700; }
.summary-badge { height: 24px; padding: 0 9px; border-radius: 999px; background: rgba(255,255,255,0.055); border: 1px solid rgba(255,255,255,0.07); font-size: 11px; font-weight: 700; display: flex; align-items: center; }

.total-display { font-size: 32px; font-weight: 800; letter-spacing: -0.9px; margin: 0; }
.goal-meta { text-align: right; }
.goal-meta-value { font-size: 14px; font-weight: 800; }

.progress-track { height: 7px; background: rgba(255,255,255,0.08); border-radius: 999px; overflow: hidden; margin: 10px 0; }
.progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #ffffff 0%, #cdcdcd 100%); transition: width 0.5s ease; }

.summary-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.stat-box { padding: 9px 10px; border-radius: 14px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.055); }
.stat-label { color: var(--text-sub); font-size: 9px; font-weight: 700; margin-bottom: 5px; text-transform: uppercase; }
.stat-value { font-size: 12px; font-weight: 800; }

/* List */
.section-title { margin: 14px 2px 10px; font-size: 17px; font-weight: 800; }
.stock-list { display: grid; gap: 10px; }
.stock-card {
  position: relative;
  border-radius: 18px;
  padding: 12px;
  background: var(--surface-1);
  border: 1px solid var(--line);
  overflow: hidden;
}
.stock-card::before { content: ""; position: absolute; inset: 0 auto 0 0; width: 4px; background: var(--brand); }

.card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 9px; }
.stock-name { font-size: 15px; font-weight: 800; margin-bottom: 3px; }
.account-badge { font-size: 10px; font-weight: 800; padding: 2px 8px; border-radius: 999px; background: rgba(255,255,255,0.06); }

.value-main { font-size: 24px; font-weight: 800; margin-bottom: 8px; }

.meta-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  padding-top: 9px;
  border-top: 1px solid rgba(255,255,255,0.06);
}
.meta-label { color: var(--text-sub); font-size: 9px; font-weight: 700; margin-bottom: 4px; text-transform: uppercase; }
.meta-value { color: var(--text-main); font-size: 12px; font-weight: 800; }

/* In-place Input */
.inline-input {
  width: 100%;
  background: var(--surface-2);
  border: 1px solid var(--accent);
  color: var(--text-main);
  font-family: inherit;
  font-size: 12px;
  font-weight: 800;
  border-radius: 4px;
  padding: 2px 4px;
  outline: none;
  text-align: left;
}

/* Bottom Bar */
.bottom-bar { position: fixed; left: 0; right: 0; bottom: calc(12px + env(safe-area-inset-bottom)); display: flex; justify-content: center; pointer-events: none; }
.update-btn { pointer-events: auto; display: flex; align-items: center; gap: 8px; height: 50px; padding: 0 24px; border-radius: 999px; background: rgba(255,255,255,0.9); color: #000; font-size: 15px; font-weight: 800; border: none; backdrop-filter: blur(20px); box-shadow: 0 10px 24px rgba(0,0,0,0.3); }

.pos { color: var(--pos); }
.neg { color: var(--neg); }
</style>
</head>

<body>
  <div class="container">
    <header class="app-header">
      <h1 class="app-title">資産</h1>
      <div class="app-subtitle">MONEY LOG</div>
    </header>

    <section class="summary-card">
      <div class="summary-top">
        <div class="summary-kicker">Project 10M</div>
        <div id="fxRateDisplay" class="summary-badge numeric">---</div>
      </div>
      <div style="display:flex; justify-content:space-between; align-items:flex-end;">
        <div>
          <div style="color:var(--text-sub); font-size:11px; font-weight:700;">Total Assets</div>
          <div id="totalDisplay" class="total-display numeric">¥0</div>
        </div>
        <div class="goal-meta">
          <div id="progRate" class="goal-meta-value numeric">(0.00%)</div>
        </div>
      </div>
      <div class="progress-track"><div id="progressBar" class="progress-fill"></div></div>
      <div class="summary-stats">
        <div class="stat-box"><div class="stat-label">Previous</div><div id="totalDayDiff" class="stat-value numeric">---</div></div>
        <div class="stat-box"><div class="stat-label">Total Profit</div><div id="totalProfitAll" class="stat-value numeric">---</div></div>
        <div class="stat-box"><div class="stat-label">Net (Est.)</div><div id="payoutDisplay" class="stat-value numeric">¥0</div></div>
      </div>
      <div id="taxNote" style="text-align:center; color:var(--text-soft); font-size:10px; margin-top:10px;" class="numeric">Tax: ¥0</div>
    </section>

    <div class="section-title">Portfolio</div>
    <div id="stockList" class="stock-list"></div>
  </div>

  <div class="bottom-bar">
    <button id="updateBtn" class="update-btn" onclick="fetchAll()">
      <span>↻</span> <span>update</span>
    </button>
  </div>

<script>
const GAS_API_URL = "https://script.google.com/macros/s/AKfycbyNWxHLVUfBd2_sYdZ-0AuoZkBElRCyNrJN36B08y8QO3wUqy7IVAb_WjqO4umUvb7a/exec";
const STORAGE_KEY = "money_log_compact_ios";

const INITIAL_DATA = [
  { name: "楽天・プラス・SOX", code: "2931123A", price: 19391, holding: 59845, cost: 121180, isStock: false, isNisa: true, diff: null },
  { name: "NASDAQ100ゴールドプラス", code: "02311251", price: 18700, holding: 0, cost: 3000, isStock: false, isNisa: true, diff: null },
  { name: "PayPay", code: "PAYP", price: 23.04, holding: 1.86131, cost: 4749, isStock: true, isNisa: false, rate: null, diff: null }
];

const BRAND_COLORS = { "2931123A": "#8b0000", "02311251": "#d4af37", "PAYP": "#ff3b30" };
let data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || INITIAL_DATA;
let currentUsdJpy = parseFloat(localStorage.getItem(STORAGE_KEY + "_usd")) || null;

// インプレース編集中のインデックスを管理
let editingCell = { index: null, field: null };

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  render();
}

function calcValuation(item) {
  if (item.isStock) {
    const rate = item.rate ?? currentUsdJpy;
    return rate ? Math.floor(item.price * rate * item.holding) : null;
  }
  return Math.floor(item.price * item.holding / 10000);
}

async function fetchAll() {
  const btn = document.getElementById("updateBtn");
  btn.disabled = true;
  await Promise.all(data.map(async (item) => {
    try {
      const res = await fetch(`${GAS_API_URL}?code=${item.code}`);
      const json = await res.json();
      if (json.status === "Success") {
        item.price = json.price;
        item.diff = json.diff ?? null;
        if (json.rate) {
          currentUsdJpy = json.rate;
          localStorage.setItem(STORAGE_KEY + "_usd", String(json.rate));
        }
      }
    } catch (e) {}
  }));
  btn.disabled = false;
  save();
}

function startEdit(index, field) {
  editingCell = { index, field };
  render();
  const input = document.getElementById(`input-${index}-${field}`);
  if (input) {
    input.focus();
    input.select();
  }
}

function finishEdit(index, field, value) {
  const num = parseFloat(value);
  if (!isNaN(num)) data[index][field] = num;
  editingCell = { index: null, field: null };
  save();
}

function render() {
  const list = document.getElementById("stockList");
  let totalValue = 0, totalCost = 0, dayDiffSum = 0, taxableProfit = 0;

  list.innerHTML = data.map((item, index) => {
    const valuation = calcValuation(item) || 0;
    totalValue += valuation;
    totalCost += item.cost;
    if (item.diff !== null) dayDiffSum += Math.floor(valuation * (parseFloat(item.diff) / 100));
    if (!item.isNisa) taxableProfit += (valuation - item.cost);

    const brandColor = BRAND_COLORS[item.code] || "#3a3a3c";
    
    // QtyとCostの表示ロジック（編集中はinputを出す）
    const renderField = (field, value, displayValue) => {
      if (editingCell.index === index && editingCell.field === field) {
        return `<input id="input-${index}-${field}" class="inline-input" type="number" step="any" value="${value}" onblur="finishEdit(${index}, '${field}', this.value)" onkeydown="if(event.key==='Enter') this.blur()">`;
      }
      return `<div onclick="startEdit(${index}, '${field}')">${displayValue}</div>`;
    };

    return `
      <section class="stock-card" style="--brand:${brandColor}">
        <div class="card-top">
          <div>
            <div class="stock-name">${item.name}</div>
            <div style="color:var(--text-sub); font-size:10px;" class="numeric">${item.code}</div>
          </div>
          <div class="account-badge">${item.isNisa ? "NISA" : "特定"}</div>
        </div>
        <div class="value-main numeric">¥${valuation.toLocaleString()}</div>
        <div class="meta-grid">
          <div><div class="meta-label">Price</div><div class="meta-value numeric">${item.price.toLocaleString()}</div></div>
          <div><div class="meta-label">Qty</div><div class="meta-value numeric">${renderField('holding', item.holding, item.holding.toLocaleString())}</div></div>
          <div><div class="meta-label">Cost</div><div class="meta-value numeric">${renderField('cost', item.cost, '¥' + item.cost.toLocaleString())}</div></div>
          <div><div class="meta-label">FX</div><div class="meta-value numeric">${item.isStock && currentUsdJpy ? '¥'+currentUsdJpy.toFixed(1) : '-'}</div></div>
        </div>
      </section>
    `;
  }).join("");

  document.getElementById("totalDisplay").textContent = "¥" + totalValue.toLocaleString();
  document.getElementById("fxRateDisplay").textContent = "USD/JPY: " + (currentUsdJpy ? "¥" + currentUsdJpy.toFixed(2) : "---");
  const progress = Math.min((totalValue / 10000000) * 100, 100);
  document.getElementById("progRate").textContent = `(${progress.toFixed(2)}%)`;
  document.getElementById("progressBar").style.width = progress + "%";
  
  const profit = totalValue - totalCost;
  const profitEl = document.getElementById("totalProfitAll");
  profitEl.textContent = (profit >= 0 ? "+" : "") + profit.toLocaleString();
  profitEl.className = "stat-value numeric " + (profit >= 0 ? "pos" : "neg");
  
  const estTax = taxableProfit > 0 ? Math.floor(taxableProfit * 0.20315) : 0;
  document.getElementById("payoutDisplay").textContent = "¥" + (totalValue - estTax).toLocaleString();
  document.getElementById("taxNote").textContent = `Tax: ¥${estTax.toLocaleString()}`;
}

render();
</script>
</body>
</html>
