<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>MONEY LOG v3.2 Dark</title>
<style>
:root {
  --bg-color: #000000; 
  --card-bg: #1c1c1e; 
  --text-main: #ffffff; 
  --text-sub: #8e8e93; 
  --radius: 16px; 
  --input-bg: #2c2c2e; 
  --input-border: #3a3a3c;
  --accent: #ffffff; 
  --pos-color: #32d74b; 
  --neg-color: #ff453a; 
}

body { 
  font-family: -apple-system, sans-serif; 
  background: var(--bg-color); 
  margin: 0; 
  padding: 12px; 
  color: var(--text-main); 
  line-height: 1.2; 
  padding-bottom: 100px; 
}
.container { max-width: 420px; margin: 0 auto; }

.progress-box {
  background: var(--card-bg);
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 15px;
  text-align: center;
  border: 1px solid var(--input-border);
}
.progress-bar-container { background: #3a3a3c; height: 6px; border-radius: 3px; margin: 12px 0; overflow: hidden; }
#progressBar { background: var(--accent); height: 100%; width: 0%; transition: width 0.5s ease-out; }
.total-val { font-size: 34px; font-weight: 800; display: block; margin: 4px 0; letter-spacing: -1px; }
.summary-stats { display: flex; justify-content: center; gap: 15px; font-size: 13px; font-weight: 700; margin-bottom: 12px; }

.payout-box {
  background: #2c2c2e; 
  padding: 10px;
  border-radius: 12px;
  margin-top: 12px;
  border: 1px solid var(--input-border);
}
.payout-val { font-size: 16px; font-weight: 700; color: #ffffff; }

.stock-card { 
  background: var(--card-bg); 
  border-radius: var(--radius); 
  padding: 16px; 
  margin-bottom: 12px; 
  position: relative; 
  border: 1px solid var(--input-border);
}
.nisa-tag { 
  font-size: 10px; 
  font-weight: bold; 
  padding: 2px 8px; 
  border-radius: 6px; 
  background: #3a3a3c; 
  color: #ffffff; 
}
.stock-name { font-weight: 800; font-size: 15px; }
.main-price { font-size: 24px; font-weight: 800; margin-top: 4px; }

.input-grid { display: grid; grid-template-columns: 1fr 1fr 1.1fr; gap: 8px; margin-top: 12px; }
.input-label { font-size: 10px; color: var(--text-sub); margin-bottom: 3px; display: block; font-weight: 600; }
.ios-input { 
  width: 100%; 
  box-sizing: border-box; 
  padding: 8px; 
  font-size: 14px; 
  border: 1px solid var(--input-border); 
  border-radius: 10px; 
  background: var(--input-bg); 
  color: #ffffff;
  font-weight: 600; 
}
.ios-input.warn { border-color: var(--neg-color); background: #3d1414; }

.btn-fixed-wrap { 
  position: fixed; 
  bottom: 30px; 
  left: 0; 
  right: 0; 
  display: flex; 
  justify-content: center; 
  pointer-events: none; 
  z-index: 100;
}
.btn-update {
  pointer-events: auto;
  background: #ffffff; 
  color: #000000;
  border: none;
  padding: 14px 32px;
  border-radius: 40px;
  font-size: 16px;
  font-weight: 700;
  box-shadow: 0 10px 25px rgba(0,0,0,0.5);
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
}
.btn-update:active { transform: scale(0.96); opacity: 0.9; }
.btn-update:disabled { opacity: 0.5; pointer-events: none; }

.last-updated { font-size: 10px; color: var(--text-sub); text-align: center; margin-top: 10px; }
@keyframes spin { 100% { transform: rotate(360deg); } }
.loading-icon { display: inline-block; animation: spin 1s linear infinite; }
.error-banner { background: #3d1414; color: #ff8080; font-size: 12px; font-weight: 700; padding: 8px 12px; border-radius: 10px; margin-bottom: 10px; display: none; }
</style>
</head>
<body>

<div class="container">
  <div id="errorBanner" class="error-banner"></div>

  <div class="progress-box">
    <div style="font-size:10px; color:var(--text-sub); display:flex; justify-content:space-between; font-weight:bold;">
      <div><span>Project 10M</span> <span id="progRate">(0%)</span></div>
      <div><span id="fxRateDisplay" style="color:var(--text-main);">USD/JPY: ---</span></div>
    </div>
    <div class="progress-bar-container"><div id="progressBar"></div></div>
    <div class="stock-name" style="color:var(--text-sub); margin-bottom:4px; font-size:11px;">Total Assets</div>
    <span id="totalDisplay" class="total-val">¥0</span>
    <div class="summary-stats">
      <span id="totalDayDiff">--</span>
      <span id="totalProfitAll">--</span>
    </div>
    <div class="payout-box">
      <div style="font-size:10px; color:var(--text-sub); font-weight:700; margin-bottom:2px;">Net (Est.)</div>
      <div id="payoutDisplay" class="payout-val">¥0</div>
    </div>
  </div>

  <div id="stockList"></div>
  <div id="lastUpdated" class="last-updated"></div>
</div>

<div class="btn-fixed-wrap">
  <button id="updateBtn" class="btn-update" onclick="fetchAll()">
    <span id="updateIcon">↻</span> update
  </button>
</div>

<script>
const GAS_API_URL = "https://script.google.com/macros/s/AKfycbyBwS13vfLF_Ndut84W1Sjujp538VOoSNa_18dtxJOqT4y6ubnpOEVm6aUTLzksI6sl/exec";
const STORAGE_KEY = "money_log_v3.2";

const ITEM_DEFAULTS = { diff: null, rate: null };
function migrateData(raw) {
  if (!Array.isArray(raw)) return null;
  return raw.map(item => ({ ...ITEM_DEFAULTS, ...item }));
}

const INITIAL_DATA = [
  { name: "楽天・プラス・SOX", code: "2931123A", price: 19391, holding: 59845, cost: 121180, isStock: false, isNisa: true, diff: null },
  { name: "NASDAQ100ゴールドプラス", code: "02311251", price: 18700, holding: 0, cost: 3000, isStock: false, isNisa: true, diff: null },
  { name: "PayPay", code: "PAYP", price: 23.04, holding: 1.86131, cost: 4749, isStock: true, isNisa: false, rate: null, diff: null }
];

let data = (() => {
  try {
    const raw = JSON.parse(localStorage.getItem(STORAGE_KEY));
    return migrateData(raw) || INITIAL_DATA;
  } catch (e) { return INITIAL_DATA; }
})();

const BRAND_COLORS = { 
  "2931123A": "#8B0000", 
  "02311251": "#D4AF37", 
  "PAYP": "#ff3b30" 
};

let currentUsdJpy = (() => {
  const saved = localStorage.getItem(STORAGE_KEY + "_usd");
  return saved ? parseFloat(saved) : null;
})();

async function fetchAll() {
  const btn = document.getElementById('updateBtn');
  const icon = document.getElementById('updateIcon');
  btn.disabled = true; icon.classList.add('loading-icon');
  hideError();
  const errors = [];
  await Promise.all(data.map(async (s) => {
    try {
      const res = await fetch(`${GAS_API_URL}?code=${s.code}`);
      const json = await res.json();
      if (json.status === "Success") {
        s.price = json.price; s.diff = json.diff ?? null;
        if (json.rate) {
          s.rate = json.rate; currentUsdJpy = json.rate;
          localStorage.setItem(STORAGE_KEY + "_usd", String(json.rate));
        }
      } else { errors.push(`${s.name}失敗`); }
    } catch (e) { errors.push(`${s.name}エラー`); }
  }));
  btn.disabled = false; icon.classList.remove('loading-icon');
  if (errors.length > 0) showError(errors.join(' / '));
  const now = new Date();
  document.getElementById('lastUpdated').textContent = `最終更新: ${now.toLocaleTimeString()}`;
  saveAndRender();
}

function showError(msg) { const el = document.getElementById('errorBanner'); el.textContent = `⚠️ ${msg}`; el.style.display = 'block'; }
function hideError() { document.getElementById('errorBanner').style.display = 'none'; }
function saveAndRender() { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); render(); }

function calcValuation(s) {
  if (s.isStock) {
    const rate = s.rate ?? currentUsdJpy;
    return rate ? Math.floor(s.price * rate * s.holding) : null;
  }
  return Math.floor(s.price * s.holding / 10000);
}

function render() {
  const list = document.getElementById('stockList');
  let totalValue = 0, totalCost = 0, dayDiffSum = 0, taxableProfit = 0;

  list.innerHTML = data.map((s, i) => {
    const val = calcValuation(s) || 0;
    totalValue += val; totalCost += s.cost;
    const hasDiff = s.diff !== null;
    const dVal = hasDiff ? Math.floor(val * (parseFloat(s.diff) / 100)) : 0;
    if (hasDiff) dayDiffSum += dVal;
    const profit = val - s.cost;
    const profitRate = s.cost > 0 ? (profit / s.cost * 100).toFixed(2) : '0.00';
    if (!s.isNisa) taxableProfit += profit;
    const brandColor = BRAND_COLORS[s.code] || '#3a3a3c';

    return `
      <div class="stock-card" style="border-left: 5px solid ${brandColor}">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <span class="stock-name">${s.name}</span>
          <span class="nisa-tag">${s.isNisa ? 'NISA' : '特定'}</span>
        </div>
        <div style="display:flex; justify-content:space-between; align-items: flex-end; margin-top:4px;">
          <span class="main-price">¥${val.toLocaleString()}</span>
          <div style="text-align:right">
            <div style="font-size:12px; font-weight:bold; color:${dVal >= 0 ? 'var(--pos-color)' : 'var(--neg-color)'}">
              Prev: ${hasDiff ? (dVal >= 0 ? '+' : '') + dVal.toLocaleString() + ' (' + (parseFloat(s.diff) >= 0 ? '+' : '') + parseFloat(s.diff).toFixed(2) + '%)' : '---'}
            </div>
            <div style="font-size:11px; font-weight:bold; color:${profit >= 0 ? 'var(--pos-color)' : 'var(--neg-color)'}">
              Total: ${profit >= 0 ? '+' : ''}${profit.toLocaleString()} (${profitRate}%)
            </div>
          </div>
        </div>
        <div class="input-grid">
          <div><span class="input-label">${s.isStock ? 'Price($)' : 'NAV'}</span>
            <input class="ios-input" type="number" step="any" value="${s.price}" onchange="updateItem(${i},'price',this.value)"></div>
          <div><span class="input-label">Qty</span>
            <input class="ios-input ${s.holding===0?'warn':''}" type="number" step="any" value="${s.holding}" onchange="updateItem(${i},'holding',this.value)"></div>
          <div><span class="input-label">Cost</span>
            <input class="ios-input" type="number" value="${s.cost}" onchange="updateItem(${i},'cost',this.value)"></div>
        </div>
      </div>`;
  }).join('');

  document.getElementById('totalDisplay').textContent = `¥${totalValue.toLocaleString()}`;
  document.getElementById('fxRateDisplay').textContent = `USD/JPY: ¥${currentUsdJpy?.toFixed(2) || '---'}`;
  
  const anyDiff = data.some(s => s.diff !== null);
  const prevTotalValue = totalValue - dayDiffSum;
  const totalDayRate = (anyDiff && prevTotalValue > 0) ? (dayDiffSum / prevTotalValue * 100).toFixed(2) : '0.00';
  
  const dayEl = document.getElementById('totalDayDiff');
  dayEl.textContent = anyDiff ? `Prev: ${(dayDiffSum >= 0 ? '+' : '')}${dayDiffSum.toLocaleString()} (${(dayDiffSum >= 0 ? '+' : '')}${totalDayRate}%)` : 'Prev: ---';
  dayEl.style.color = dayDiffSum >= 0 ? 'var(--pos-color)' : 'var(--neg-color)';

  const overallProfit = totalValue - totalCost;
  const overallProfitRate = totalCost > 0 ? (overallProfit / totalCost * 100).toFixed(2) : '0.00';
  
  const profEl = document.getElementById('totalProfitAll');
  profEl.textContent = `Total: ${(overallProfit >= 0 ? '+' : '')}${overallProfit.toLocaleString()} (${overallProfitRate}%)`;
  profEl.style.color = overallProfit >= 0 ? 'var(--pos-color)' : 'var(--neg-color)';

  const estTax = taxableProfit > 0 ? Math.floor(taxableProfit * 0.20315) : 0;
  document.getElementById('payoutDisplay').innerHTML = `¥${(totalValue - estTax).toLocaleString()} <span style="font-size:10px; opacity:0.7; font-weight:normal;">(Tax: ¥${estTax.toLocaleString()})</span>`;

  const prog = Math.min((totalValue / 10000000) * 100, 100);
  document.getElementById('progRate').textContent = `(${prog.toFixed(2)}%)`;
  document.getElementById('progressBar').style.width = prog + '%';
}

function updateItem(i, field, val) {
  const parsed = parseFloat(val);
  if (!isNaN(parsed)) { data[i][field] = parsed; saveAndRender(); }
}

render();
</script>
</body>
</html>
